  },

  _saveKey() {
    var v = (document.getElementById('fu-apikey')||{}).value||'';
    if (!v.startsWith('sk-')) { FinanceModule._setStatus('Key must start with sk-', 'err'); return; }
    sessionStorage.setItem('truos_apikey', v);
    FinanceModule._closeUpload();
    FinanceModule._openUpload();
  },

  _setUploadAcct(id) {
    this._uploadAcct = id;
    ['nfcu','wf'].forEach(function(a){
      var el = document.getElementById('fu-'+a);
      if (el) el.className = 'fin-upload-acct'+(FinanceModule._uploadAcct===a?' selected':'');
    });
  },

  _setStatus(msg, type) {
    var el = document.getElementById('fu-status');
    if (!el) return;
    el.textContent = msg;
    el.className = 'fin-upload-status' + (type ? ' '+type : '');
  },

  _setWarn(msg) {
    var el = document.getElementById('fu-warn');
    if (!el) return;
    el.textContent = msg;
    el.className = 'fin-upload-warning' + (msg ? ' show' : '');
  },

  _showConfirm(show) {
    var el = document.getElementById('fu-confirm');
    if (el) el.className = 'fin-upload-confirm' + (show ? ' show' : '');
  },

  _onFileSelected(e) {
    var f = e.target.files[0];
    if (f) this._processFile(f);
  },

  _processFile(file) {
    var key = this._getApiKey();
    if (!key) { this._setStatus('Add your API key first.', 'err'); return; }

    this._setStatus('Reading file…');
    this._setWarn('');
    this._showConfirm(false);
    this._uploadParsed = null;

    var reader = new FileReader();
    var self = this;
    reader.onload = function(e) {
      var b64   = e.target.result.split(',')[1];
      var mtype = file.type || 'application/pdf';
      self._setStatus('Sending to Claude AI…');
      self._callClaudeAPI(key, b64, mtype, file.name);
    };
    reader.readAsDataURL(file);
  },

  _callClaudeAPI(apiKey, b64, mtype, filename) {
    var self     = this;
    var acctName = this._uploadAcct === 'nfcu' ? 'Navy Federal Credit Union' : 'Wells Fargo';

    var prompt =
      'You are a bank statement parser for a personal finance app. '+
      'The user believes this is a '+acctName+' statement. '+
      'Extract ALL transaction data and return ONLY valid JSON — no markdown, no explanation.\n\n'+
      'REQUIRED JSON SHAPE:\n'+
      '{\n'+
      '  "detected_bank": "<bank name found in document>",\n'+
      '  "period_label": "<e.g. February 2026>",\n'+
      '  "cal_start": "<YYYY-MM-DD>",\n'+
      '  "cal_end": "<YYYY-MM-DD>",\n'+
      '  "start_bal": <number>,\n'+
      '  "end_bal": <number>,\n'+
      '  "total_income": <number>,\n'+
      '  "total_spend": <number>,\n'+
      '  "transfers_in": <number>,\n'+
      '  "transfers_out": <number>,\n'+
      '  "fees": <number>,\n'+
      '  "spending": {\n'+
      '    "Dining": <number>,\n'+
      '    "Entertainment": <number>,\n'+
      '    "Groceries": <number>,\n'+
      '    "Transport": <number>,\n'+
      '    "Personal Care": <number>,\n'+
      '    "Medical": <number>,\n'+
      '    "P2P": <number>,\n'+
      '    "Subscriptions": <number>,\n'+
      '    "ATM": <number>,\n'+
      '    "Fees": <number>,\n'+
      '    "Other": <number>\n'+
      '  }\n'+
      '}\n\n'+
      'Rules:\n'+
      '- P2P = Zelle, Venmo, CashApp transfers to/from people\n'+
      '- Transport = gas, parking, Uber, Lyft, tolls\n'+
      '- Income = payroll/direct deposits only\n'+
      '- Use 0 for any category with no transactions\n'+
      '- Return ONLY the JSON object, nothing else';

    var docType = mtype === 'application/pdf' ? 'document' : 'image';
    var msgContent = docType === 'document'
      ? [{ type: 'document', source: { type: 'base64', media_type: 'application/pdf', data: b64 } }, { type: 'text', text: prompt }]
      : [{ type: 'image',    source: { type: 'base64', media_type: mtype,              data: b64 } }, { type: 'text', text: prompt }];

    fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{ role: 'user', content: msgContent }]
      })
    })
    .then(function(r){ return r.json(); })
    .then(function(data){
      if (data.error) { self._setStatus('API error: '+data.error.message, 'err'); return; }
      var raw = (data.content||[]).map(function(b){ return b.text||''; }).join('');
      var clean = raw.replace(/```json|```/g,'').trim();
      var parsed;
      try { parsed = JSON.parse(clean); }
      catch(e) { self._setStatus('Parse error — Claude returned unexpected format.\n\n'+raw.slice(0,300), 'err'); return; }

      self._uploadParsed = parsed;

      // ── Mismatch detection ──
      var detected   = (parsed.detected_bank||'').toLowerCase();
      var userPicked = self._uploadAcct;
      var nfcuHints  = detected.includes('navy') || detected.includes('nfcu');
      var wfHints    = detected.includes('wells') || detected.includes('fargo');
      var mismatch   = false;
      if (userPicked==='nfcu' && wfHints)  { self._setWarn('⚠ You picked Navy Federal, but document looks like Wells Fargo'); mismatch=true; }
      if (userPicked==='wf'   && nfcuHints){ self._setWarn('⚠ You picked Wells Fargo, but document looks like Navy Federal'); mismatch=true; }
      if (!mismatch) self._setWarn('');

      // ── Summary ──
      var summary =
        'DETECTED: '+(parsed.detected_bank||'Unknown')+'\n'+
        'PERIOD:   '+(parsed.period_label||'—')+'\n'+
        'RANGE:    '+(parsed.cal_start||'?')+' → '+(parsed.cal_end||'?')+'\n'+
        'BAL:      $'+(parsed.start_bal||0).toFixed(2)+' → $'+(parsed.end_bal||0).toFixed(2)+'\n'+
        'INCOME:   $'+(parsed.total_income||0).toFixed(2)+'\n'+
        'SPEND:    $'+(parsed.total_spend||0).toFixed(2)+'\n'+
        '────────────────────────\n'+
        Object.entries(parsed.spending||{}).filter(function(kv){ return kv[1]>0; })
          .map(function(kv){ return kv[0]+': $'+kv[1].toFixed(2); }).join('\n');

      self._setStatus(summary, 'ok');
      self._showConfirm(true);
    })
    .catch(function(err){ self._setStatus('Network error: '+err.message, 'err'); });
  },

  _commitUpload() {
    var p = this._uploadParsed;
    if (!p) return;

    // Build period key from cal dates
    var y, m;
    if (p.cal_start) { var d=p.cal_start.split('-'); y=parseInt(d[0]); m=parseInt(d[1]); }
    else if (p.period_label) {
      var months = ['january','february','march','april','may','june','july','august','september','october','november','december'];
      var lower = p.period_label.toLowerCase();
      months.forEach(function(mn,i){ if(lower.includes(mn)){ m=i+1; } });
      var yr = p.period_label.match(/\d{4}/);
      y = yr ? parseInt(yr[0]) : new Date().getFullYear();
    }
    if (!y || !m) { this._setStatus('Could not determine period — check dates.', 'err'); return; }
    var key = y+'-'+(m<10?'0':'')+m+'-CAL';

    var entry = {
      income:       p.total_income   || 0,
      startBal:     p.start_bal      || 0,
      endBal:       p.end_bal        || 0,
      transfersOut: p.transfers_out  || 0,
      transfersIn:  p.transfers_in   || 0,
      fees:         p.fees           || 0,
      spending:     p.spending       || {},
      meta: {
        period:    p.period_label || key,
        cal_start: p.cal_start    || '',
        cal_end:   p.cal_end      || '',
        stmt_start:'', stmt_end:'',
        days: (function(){
          if (!p.cal_start||!p.cal_end) return 30;
          return Math.round((new Date(p.cal_end)-new Date(p.cal_start))/(864e5))+1;
        })(),
        source: 'ai_upload'
      }
    };

    var data = this._load();
    if (!data.statements[key]) data.statements[key] = { nfcu: null, wf: null };
    data.statements[key][this._uploadAcct] = entry;
    this._save(data);
    this._activePeriod = key;
    this._closeUpload();
    Shell.toast('Statement imported — '+key);
    this.init();
  },

  _closeUpload() {
    var el = document.getElementById('fin-upload-overlay');
    if (el) el.remove();
    this._uploadParsed = null;
  },

  teardown() { this._panelOpen = false; if (this._cogOpen) this._closeCog(); }
}
