<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TruOS">
<title>TruOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<style>
/* ═══════════════════════════════════════════
   SHELL — Tokens & layout
═══════════════════════════════════════════ */
:root {
  --glass:        rgba(255,255,255,0.07);
  --glass-border: rgba(255,255,255,0.12);
  --glass-hi:     rgba(255,255,255,0.18);
  --bg:           #08090a;
  --amber:        #f5a623;
  --purple:       #9e61ff;
  --red:          #ff4757;
  --red-dim:      rgba(255,71,87,0.12);
  --green:        #2ed573;
  --blue:         #1e90ff;
  --text:         #ffffff;
  --muted:        rgba(255,255,255,0.45);
  --sans:         'Syne', sans-serif;
  --mono:         'Space Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  overflow-x: hidden;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -1;
  background:
    radial-gradient(circle at 12% 18%, rgba(245,166,35,0.18) 0%, transparent 42%),
    radial-gradient(circle at 88% 82%, rgba(158,97,255,0.16) 0%, transparent 42%),
    radial-gradient(circle at 50% 50%, rgba(30,144,255,0.06) 0%, transparent 50%);
  filter: blur(70px);
  animation: meshShift 22s ease-in-out infinite alternate;
}
@keyframes meshShift {
  0%   { transform: scale(1) rotate(0deg); }
  100% { transform: scale(1.25) rotate(6deg); }
}

#main-content { min-height: 100dvh; padding-bottom: 90px; }

/* ── Shell Nav ── */
.shell-nav {
  position: fixed; bottom: 0;
  width: 100%; max-width: 480px;
  background: rgba(8,9,10,0.82);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid var(--glass-border);
  display: grid; grid-template-columns: repeat(5,1fr);
  padding: 10px 0 max(16px, env(safe-area-inset-bottom));
  z-index: 900;
}
.nav-tab {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  cursor: pointer; opacity: 0.32; transition: opacity 0.2s;
}
.nav-tab.active { opacity: 1; }
.nav-tab svg { width: 18px; height: 18px; stroke: var(--muted); }
.nav-tab.active svg { stroke: var(--amber); }
.nav-label { font-family: var(--mono); font-size: 7px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
.nav-tab.active .nav-label { color: var(--amber); }

/* ── Shell Toast ── */
#shell-toast {
  position: fixed; top: 20px; left: 50%;
  transform: translateX(-50%) translateY(-120px);
  background: var(--text); color: #000;
  padding: 10px 24px; border-radius: 30px;
  font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
  transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
  z-index: 9999; white-space: nowrap; pointer-events: none;
}
#shell-toast.show { transform: translateX(-50%) translateY(0); }
#shell-toast.err  { background: var(--red); color: #fff; }

/* ═══════════════════════════════════════════
   SHARED — Used by all modules
═══════════════════════════════════════════ */
.mod-header {
  padding: 28px 20px 8px;
  display: flex; justify-content: space-between; align-items: flex-end;
}
.sys-label {
  font-family: var(--mono); font-size: 8px; letter-spacing: 4px;
  color: var(--muted); text-transform: uppercase; display: block;
}
.mod-title { font-size: 26px; font-weight: 800; letter-spacing: -1px; line-height: 1.05; }
.mod-title em { font-style: normal; color: var(--amber); }

.stats-bar {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 10px; padding: 12px 20px;
}
.stat {
  background: var(--glass); backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border); border-radius: 16px;
  padding: 12px 10px; text-align: center;
}
.stat-val { font-family: var(--mono); font-size: 21px; font-weight: 700; display: block; line-height: 1; }
.stat-sub { font-family: var(--mono); font-size: 8px; text-transform: uppercase; color: var(--muted); letter-spacing: 1px; margin-top: 4px; display: block; }

.pill-row { padding: 8px 20px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
.pill-row::-webkit-scrollbar { display: none; }

.pill {
  padding: 7px 16px; border-radius: 30px;
  background: var(--glass); border: 1px solid var(--glass-border);
  color: var(--text); font-family: var(--sans); font-size: 11px; font-weight: 600;
  white-space: nowrap; cursor: pointer; transition: 0.2s; backdrop-filter: blur(5px);
}
.pill.active  { background: var(--text); color: #000; border-color: var(--text); }
.pill.p-amber { background: var(--amber); color: #000; border-color: var(--amber); }

.list-area { padding: 4px 20px 20px; display: flex; flex-direction: column; gap: 10px; }
.section-head {
  font-family: var(--mono); font-size: 9px; color: var(--muted);
  letter-spacing: 2px; text-transform: uppercase;
  padding: 12px 4px 4px;
  display: flex; justify-content: space-between; align-items: center;
}
.card {
  background: var(--glass); backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border); border-radius: 18px;
  padding: 15px; display: flex; align-items: center; gap: 14px; transition: 0.2s;
}
.card:active { transform: scale(0.985); }
.card.overdue { border-color: rgba(255,71,87,0.45); background: rgba(255,71,87,0.06); }
.card.today   { border-color: rgba(245,166,35,0.4);  background: rgba(245,166,35,0.05); }
.card.done    { opacity: 0.32; filter: grayscale(0.7); }

.checkbox {
  width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
  border: 1.5px solid var(--glass-border);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; cursor: pointer; transition: 0.15s;
}
.checkbox.checked { background: var(--green); border-color: var(--green); color: #000; }

.card-body { flex: 1; min-width: 0; }
.card-title { font-size: 14px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 3px; }
.card-meta  { font-family: var(--mono); font-size: 10px; color: var(--muted); }
.btn-del    { background: transparent; border: none; color: var(--muted); padding: 5px; cursor: pointer; font-size: 14px; opacity: 0.4; transition: 0.2s; }
.btn-del:hover { opacity: 1; color: var(--red); }
.clear-btn  { background: transparent; border: 1px solid rgba(255,71,87,0.4); color: var(--red); font-size: 8px; font-family: var(--mono); padding: 2px 8px; border-radius: 4px; cursor: pointer; letter-spacing: 1px; }
.empty-state { text-align: center; padding: 50px 20px; color: var(--muted); font-family: var(--mono); font-size: 10px; letter-spacing: 2px; }

.slide-panel {
  position: fixed; bottom: 0; left: 50%;
  transform: translateX(-50%) translateY(100%);
  width: 100%; max-width: 480px;
  background: rgba(10,10,12,0.96); backdrop-filter: blur(30px);
  border-radius: 28px 28px 0 0;
  padding: 28px 20px max(48px,env(safe-area-inset-bottom));
  transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
  z-index: 800; border-top: 1px solid var(--glass-border);
}
.slide-panel.open { transform: translateX(-50%) translateY(0); }

input, select {
  width: 100%; background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: 12px; padding: 12px; color: var(--text); margin-bottom: 10px;
  font-family: var(--sans); font-size: 14px; outline: none; -webkit-appearance: none;
}
input:focus, select:focus { border-color: var(--amber); }
select option { background: #141416; }

.fab {
  position: fixed; bottom: 82px; right: 20px;
  width: 54px; height: 54px; border-radius: 50%;
  background: var(--text); border: none; color: #000;
  font-size: 26px; box-shadow: 0 8px 28px rgba(0,0,0,0.4);
  z-index: 850; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: 0.3s;
}
.fab.open { transform: rotate(45deg); background: var(--red-dim); color: var(--red); border: 1px solid var(--red); box-shadow: none; }


/* ═══════════════════════════════════════════
   ACADEMIC v2 — Mental Clarity styles
═══════════════════════════════════════════ */
.week-header {
  padding: 18px 4px 6px;
  display: flex; flex-direction: column; gap: 6px;
}
.week-label {
  font-family: var(--mono); font-size: 10px; font-weight: 700;
  color: var(--text); letter-spacing: 2px; text-transform: uppercase;
  display: flex; justify-content: space-between; align-items: center;
}
.week-progress-row {
  display: flex; align-items: center; gap: 8px;
}
.week-bar-track {
  flex: 1; height: 4px; background: rgba(255,255,255,0.08);
  border-radius: 4px; overflow: hidden;
}
.week-bar-fill {
  height: 100%; border-radius: 4px;
  background: linear-gradient(90deg, var(--green), var(--amber));
  transition: width 0.4s cubic-bezier(0.16,1,0.3,1);
}
.week-bar-label {
  font-family: var(--mono); font-size: 9px; color: var(--muted);
  white-space: nowrap;
}
.card.soon { border-color: rgba(245,166,35,0.45); background: rgba(245,166,35,0.06); }

.completed-toggle {
  font-family: var(--mono); font-size: 10px; color: var(--muted);
  letter-spacing: 1px; padding: 14px 4px 6px;
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  user-select: none; -webkit-user-select: none;
}
.completed-toggle:active { opacity: 0.6; }
.completed-caret { font-size: 8px; transition: transform 0.2s; }
.completed-caret.open { transform: rotate(90deg); }
.completed-list { display: flex; flex-direction: column; gap: 10px; }
.purge-row { padding: 8px 4px 4px; display: flex; justify-content: flex-end; }

/* ═══════════════════════════════════════════
   FINANCE MODULE — v3.0 CALENDAR SLICE
   Dual-Account · Verified Forensic Engine
═══════════════════════════════════════════ */
.fin-wrap { padding: 0 18px 100px; }

.fin-period-row {
  display: flex; gap: 8px; align-items: center;
  margin-bottom: 10px; overflow-x: auto; scrollbar-width: none;
}
.fin-period-row::-webkit-scrollbar { display: none; }

/* Compact account header */
.fin-acct-header-bar { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
.fin-acct-line { display: flex; align-items: baseline; justify-content: space-between; font-family: var(--mono); font-size: 10px; }
.fin-acct-line-name { font-weight: 700; min-width: 90px; }
.fin-acct-line-detail { color: var(--muted); font-size: 9px; text-align: right; }
.fin-acct-netted { font-family: var(--mono); font-size: 9px; color: rgba(30,144,255,0.7); margin-top: 1px; }
.fin-active-zone { font-family: var(--mono); font-size: 8px; color: var(--muted); letter-spacing: 0.5px; margin: 4px 0 8px; }

/* Pace bar */
.fin-pace-label { font-family: var(--mono); font-size: 8px; letter-spacing: 1px; display: flex; justify-content: space-between; margin-bottom: 4px; }
.fin-pace-bar { height: 4px; background: var(--glass); border-radius: 4px; overflow: visible; margin-bottom: 14px; border: 1px solid var(--glass-border); position: relative; }
.fin-pace-spend { height: 100%; border-radius: 4px; transition: width 0.6s; }
.fin-pace-day-marker { position: absolute; top: -3px; width: 2px; height: calc(100% + 6px); background: rgba(255,255,255,0.6); border-radius: 1px; }

/* Category bars */
.fin-cats { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.fin-cat-row { display: flex; flex-direction: column; gap: 4px; }
.fin-cat-top { display: flex; align-items: center; gap: 10px; }
.fin-cat-name { font-family: var(--mono); font-size: 9px; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); width: 90px; flex-shrink: 0; }
.fin-cat-dual-bar { flex: 1; display: flex; flex-direction: column; gap: 3px; }
.fin-cat-bar-track { height: 5px; background: var(--glass); border-radius: 4px; overflow: hidden; border: 1px solid var(--glass-border); }
.fin-cat-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s cubic-bezier(0.16,1,0.3,1); }
.fin-cat-amt { font-family: var(--mono); font-size: 10px; font-weight: 700; width: 54px; text-align: right; flex-shrink: 0; }

/* Flags */
.fin-phase-head { font-family: var(--mono); font-size: 8px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); padding: 14px 0 8px; display: flex; justify-content: space-between; align-items: center; }
.fin-phase-head span { color: var(--amber); }
.fin-flags { display: flex; flex-direction: column; gap: 8px; margin-bottom: 6px; }
.fin-flag { border-radius: 12px; padding: 11px 14px; font-family: var(--mono); font-size: 10px; letter-spacing: 0.5px; display: flex; align-items: flex-start; gap: 10px; }
.fin-flag.flag-red    { background: rgba(255,71,87,0.10);  border: 1px solid rgba(255,71,87,0.3); }
.fin-flag.flag-amber  { background: rgba(245,166,35,0.10); border: 1px solid rgba(245,166,35,0.3); }
.fin-flag.flag-blue   { background: rgba(30,144,255,0.10); border: 1px solid rgba(30,144,255,0.3); }
.fin-flag.flag-green  { background: rgba(46,213,115,0.10); border: 1px solid rgba(46,213,115,0.3); }
.fin-flag-icon { font-size: 14px; flex-shrink: 0; line-height: 1.3; }
.fin-flag-body { flex: 1; min-width: 0; }
.fin-flag-title { font-weight: 700; margin-bottom: 2px; }
.fin-flag-detail { color: var(--muted); font-size: 9px; line-height: 1.6; }
.fin-shift-cost { margin-top: 5px; font-size: 10px; font-weight: 700; color: var(--red); letter-spacing: 0.5px; }

/* Zelle-to-self tracker */
.fin-zts-wrap { margin-bottom: 14px; }
.fin-zts-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; font-family: var(--mono); font-size: 9px; }
.fin-zts-bar-track { flex: 1; height: 4px; background: var(--glass); border-radius: 4px; overflow: hidden; border: 1px solid var(--glass-border); }
.fin-zts-bar-fill { height: 100%; border-radius: 4px; background: var(--blue); transition: width 0.6s; }
.fin-zts-label { width: 36px; text-align: right; color: var(--muted); }
.fin-zts-amt { width: 52px; text-align: right; font-weight: 700; color: var(--blue); }
.fin-zts-summary { font-family: var(--mono); font-size: 9px; color: var(--muted); margin-top: 6px; line-height: 1.7; }
.fin-zts-warning { color: var(--amber); font-weight: 700; }

/* Phase 4 sticky */
.fin-p4-sticky { position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%); width: calc(100% - 32px); max-width: 448px; background: rgba(8,9,10,0.94); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 12px 16px; z-index: 700; display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; }
.fin-p4-metric { text-align: center; }
.fin-p4-val { font-family: var(--mono); font-size: 16px; font-weight: 700; display: block; line-height: 1.1; }
.fin-p4-sub { font-family: var(--mono); font-size: 7px; text-transform: uppercase; color: var(--muted); letter-spacing: 0.5px; margin-top: 3px; }

/* 3-month compare */
.fin-compare-bars { display: flex; align-items: flex-end; gap: 10px; height: 72px; margin: 8px 0 14px; }
.fin-cbar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
.fin-cbar { width: 100%; border-radius: 5px 5px 0 0; min-height: 4px; }
.fin-cbar-label { font-family: var(--mono); font-size: 8px; color: var(--muted); }
.fin-cbar-amt { font-family: var(--mono); font-size: 9px; font-weight: 700; }

/* Quick Add panel */
.fin-panel-title { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 16px; color: var(--muted); }
.fin-panel-title span { color: var(--amber); }
.fin-section-head { font-family: var(--mono); font-size: 8px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); margin: 12px 0 6px; }
.fin-save-btn { width: 100%; padding: 14px; background: var(--amber); color: #000; border: none; border-radius: 14px; font-family: var(--mono); font-weight: 700; font-size: 12px; letter-spacing: 2px; cursor: pointer; margin-top: 14px; }
.fin-acct-select { display: flex; gap: 8px; margin-bottom: 10px; }
.fin-acct-opt { flex: 1; padding: 10px; border-radius: 12px; text-align: center; background: var(--glass); border: 1px solid var(--glass-border); font-family: var(--mono); font-size: 10px; cursor: pointer; transition: 0.2s; }
.fin-acct-opt.selected { border-color: var(--amber); color: var(--amber); }
.fin-advanced-toggle { font-family: var(--mono); font-size: 9px; color: var(--muted); background: transparent; border: none; cursor: pointer; letter-spacing: 1px; text-decoration: underline; padding: 4px 0; display: block; }
.fin-advanced-section { display: none; }
.fin-advanced-section.open { display: block; }
.fin-cat-inputs { display: flex; flex-direction: column; gap: 6px; }
.fin-cat-input-row { display: flex; align-items: center; gap: 8px; }
.fin-cat-input-label { font-family: var(--mono); font-size: 9px; text-transform: uppercase; width: 100px; flex-shrink: 0; color: var(--muted); }
.fin-cat-input-row input { margin-bottom: 0; flex: 1; }

/* Settings cog */
.fin-cog-btn { background: transparent; border: 1px solid var(--glass-border); border-radius: 8px; padding: 4px 8px; cursor: pointer; font-size: 14px; color: var(--muted); transition: 0.2s; }
.fin-cog-btn:active { color: var(--amber); }
.fin-cog-modal { position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.7); display: flex; align-items: flex-end; justify-content: center; }
.fin-cog-inner { background: rgba(10,10,12,0.98); border-radius: 24px 24px 0 0; padding: 24px 20px max(40px,env(safe-area-inset-bottom)); width: 100%; max-width: 480px; border-top: 1px solid var(--glass-border); }
.fin-cog-title { font-family: var(--mono); font-size: 10px; letter-spacing: 2px; color: var(--muted); margin-bottom: 16px; }
.fin-cog-row { margin-bottom: 12px; }
.fin-cog-label { font-family: var(--mono); font-size: 9px; color: var(--muted); margin-bottom: 4px; }
.fin-cog-save { width: 100%; padding: 12px; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 12px; color: var(--text); font-family: var(--mono); font-size: 11px; letter-spacing: 1px; cursor: pointer; margin-top: 8px; transition: 0.2s; }
.fin-cog-save:active { background: var(--amber); color: #000; }
.fin-cog-close { width: 100%; padding: 10px; background: transparent; border: none; color: var(--muted); font-family: var(--mono); font-size: 10px; cursor: pointer; margin-top: 4px; }

/* ── AI Upload Modal ── */
.fin-upload-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.82); z-index:9000; display:flex; align-items:flex-end; justify-content:center; }
.fin-upload-sheet { background:var(--surface); border:1px solid var(--border); border-radius:16px 16px 0 0; width:100%; max-width:540px; padding:28px 24px 40px; display:flex; flex-direction:column; gap:16px; animation:slideUp .22s ease; }
@keyframes slideUp { from { transform:translateY(60px); opacity:0; } to { transform:translateY(0); opacity:1; } }
.fin-upload-title { font-family:var(--syne); font-size:15px; font-weight:700; color:var(--text); letter-spacing:.06em; text-transform:uppercase; }
.fin-upload-title em { color:var(--accent); font-style:normal; }
.fin-upload-acct-row { display:flex; gap:8px; }
.fin-upload-acct { flex:1; padding:10px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--muted); font-family:var(--mono); font-size:11px; text-align:center; cursor:pointer; letter-spacing:.05em; transition:border-color .15s,color .15s; }
.fin-upload-acct.selected { border-color:var(--accent); color:var(--accent); }
.fin-upload-drop { border:1.5px dashed var(--border); border-radius:10px; padding:32px 16px; text-align:center; cursor:pointer; transition:border-color .15s; font-family:var(--mono); color:var(--muted); font-size:11px; line-height:1.8; }
.fin-upload-drop:hover, .fin-upload-drop.drag { border-color:var(--accent); color:var(--accent); }
.fin-upload-drop input[type=file] { display:none; }
.fin-upload-drop .drop-icon { font-size:28px; margin-bottom:8px; display:block; }
.fin-upload-status { font-family:var(--mono); font-size:11px; color:var(--muted); background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:12px 14px; min-height:44px; white-space:pre-wrap; line-height:1.6; }
.fin-upload-status.err { color:var(--red); border-color:var(--red-dim); }
.fin-upload-status.warn { color:#f5a623; border-color:#f5a62344; }
.fin-upload-status.ok { color:var(--green); border-color:var(--green-dim); }

<script>
'use strict';

/* ═══════════════════════════════════════════
   FIREBASE CONFIG
═══════════════════════════════════════════ */
const FIREBASE_CONFIG = {
  apiKey:            "AIzaSyCNAzcnmXuuPkUQljum0p8GEAPe-YBh2bU",
  authDomain:        "realtime-database-ebc45.firebaseapp.com",
  databaseURL:       "https://realtime-database-ebc45-default-rtdb.firebaseio.com",
  projectId:         "realtime-database-ebc45",
  storageBucket:     "realtime-database-ebc45.firebasestorage.app",
  messagingSenderId: "712853625298",
  appId:             "1:712853625298:web:ea3001eaf8b9f2c067100b"
};

/* ═══════════════════════════════════════════
   TruDB — Firebase + localStorage sync layer
   ─────────────────────────────────────────
   • All reads hit localStorage first (instant, works offline)
   • All writes go to localStorage AND Firebase simultaneously
   • Real-time listeners push remote changes to every open device
   • If Firebase is not configured, runs fully on localStorage only
═══════════════════════════════════════════ */
const TruDB = {
  _db:        null,
  _listeners: {},
  _ready:     false,

  init() {
    const configured = FIREBASE_CONFIG.apiKey && !FIREBASE_CONFIG.apiKey.startsWith('PASTE');
    if (!configured) {
      console.info('TruDB: Firebase not configured — running on localStorage only');
      return;
    }
    try {
      if (!firebase.apps.length) firebase.initializeApp(FIREBASE_CONFIG);
      this._db    = firebase.database();
      this._ready = true;
      // Silent anonymous sign-in — locked to your specific UID in rules
      firebase.auth().signInAnonymously().then(function(cred) {
        var uid = cred.user.uid;
        localStorage.setItem('truos-owner-uid', uid);
        var badge = document.getElementById('sync-badge');
        if (badge && !localStorage.getItem('truos-uid-locked')) {
          badge.style.pointerEvents = 'auto';
          badge.style.cursor = 'pointer';
          badge.title = 'Click to copy your UID for Firebase rules';
          badge.addEventListener('click', function() {
            navigator.clipboard.writeText(uid).then(function() {
              Shell.toast('UID COPIED — PASTE INTO FIREBASE RULES');
            });
          });
          badge.textContent = '⚠ COPY UID';
          badge.className = 'sync-badge syncing';
        }
        TruDB._migrateAcademic();
        TruDB._migrateIncome();
      }).catch(function(e) { console.warn('TruDB: auth failed', e); });
      // Track connection state for sync badge
      this._db.ref('.info/connected').on('value', function(snap) {
        var badge = document.getElementById('sync-badge');
        if (!badge) return;
        if (snap.val()) {
          badge.textContent = '● SYNCED';
          badge.className   = 'sync-badge online';
        } else {
          badge.textContent = '○ OFFLINE';
          badge.className   = 'sync-badge offline';
        }
      });
    } catch(e) {
      console.warn('TruDB: Firebase init failed, running offline:', e);
      this._ready = false;
    }
  },

  // Normalize localStorage key → Firebase path
  _path(key) { return '/truos/' + key.replace(/[.#$\[\]]/g, '_'); },

  // Write to localStorage immediately + push to Firebase
  set(key, value) {
    var json = JSON.stringify(value);
    try { localStorage.setItem(key, json); } catch(e) {}
    if (this._ready && this._db) {
      var badge = document.getElementById('sync-badge');
      if (badge) { badge.textContent = '↑ SYNCING'; badge.className = 'sync-badge syncing'; }
      this._db.ref(this._path(key)).set(json).catch(function(e) { console.warn('TruDB write error:', e); });
    }
  },

  // Read from localStorage cache (synchronous, instant)
  get(key) { return localStorage.getItem(key); },

  // Subscribe to real-time changes from any device
  // cb(parsedValue) fires whenever another device writes
  on(key, cb) {
    if (!this._ready || !this._db) return;
    if (this._listeners[key]) this._listeners[key].off();
    var ref = this._db.ref(this._path(key));
    this._listeners[key] = ref;
    ref.on('value', function(snap) {
      var remote = snap.val();
      if (remote === null || remote === undefined) return;
      var local = localStorage.getItem(key);
      if (remote !== local) {
        try { localStorage.setItem(key, remote); } catch(e) {}
        try { cb(JSON.parse(remote)); } catch(e) { cb(remote); }
      }
    });
  },

  off(key) {
    if (this._listeners[key]) {
      this._listeners[key].off();
      delete this._listeners[key];
    }
  },

  offAll() { Object.keys(this._listeners).forEach(function(k) { TruDB.off(k); }); },

  // One-time migration: push truos-academic from localStorage → Firebase
  // Runs only if Firebase is authenticated and the key hasn't been migrated yet.
  // Flag is set after a successful write (or if there's nothing to migrate),
  // so a failed write retries on next load rather than being silently skipped.
  _migrateAcademic() {
    if (localStorage.getItem('truos-ls-to-fb-migrated')) return;
    var local = localStorage.getItem('truos-academic');
    if (!local) {
      localStorage.setItem('truos-ls-to-fb-migrated', '1');
      return;
    }
    var path = this._path('truos-academic');
    this._db.ref(path).once('value').then(function(snap) {
      if (snap.val() !== null) {
        // Firebase already has data — nothing to migrate
        localStorage.setItem('truos-ls-to-fb-migrated', '1');
        return;
      }
      return TruDB._db.ref(path).set(local).then(function() {
        localStorage.setItem('truos-ls-to-fb-migrated', '1');
        console.info('TruDB: truos-academic migrated from localStorage to Firebase');
      });
    }).catch(function(e) {
      console.warn('TruDB: academic migration failed, will retry on next load', e);
    });
  },

  // One-time migration: push truos_schedule_v34 from localStorage → Firebase
  // Same pattern as _migrateAcademic — retries on next load if write fails.
  _migrateIncome() {
    if (localStorage.getItem('truos-income-migrated')) return;
    var local = localStorage.getItem('truos_schedule_v34');
    if (!local) {
      localStorage.setItem('truos-income-migrated', '1');
      return;
    }
    var path = this._path('truos_schedule_v34');
    this._db.ref(path).once('value').then(function(snap) {
      if (snap.val() !== null) {
        // Firebase already has data — nothing to migrate
        localStorage.setItem('truos-income-migrated', '1');
        return;
      }
      return TruDB._db.ref(path).set(local).then(function() {
        localStorage.setItem('truos-income-migrated', '1');
        console.info('TruDB: truos_schedule_v34 migrated from localStorage to Firebase');
      });
    }).catch(function(e) {
      console.warn('TruDB: income migration failed, will retry on next load', e);
    });
  }
};

/* ═══════════════════════════════════════════
   SHELL
═══════════════════════════════════════════ */
const Shell = {
  _active: null,
  _clockInterval: null,
  modules: {},

  init() {
    TruDB.init();
    document.getElementById('shell-nav').addEventListener('click', e => {
      const tab = e.target.closest('[data-mod]');
      if (tab) this.switchTo(tab.dataset.mod);
    });
    this.switchTo('dashboard');
  },

  switchTo(name) {
    const mod = this.modules[name];
    if (!mod) return;
    // No optional chaining — Safari fails silently on ?.
    if (this._active && this._active.teardown) this._active.teardown();
    TruDB.offAll();
    if (this._clockInterval) { clearInterval(this._clockInterval); this._clockInterval = null; }
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.mod === name));
    document.querySelectorAll('.slide-panel, .fab').forEach(el => el.remove());
    this._active = mod;
    mod.init();
    if (mod.updateClock) {
      mod.updateClock();
      this._clockInterval = setInterval(() => mod.updateClock(), 1000);
    }
  },

  exportState() {
    // Collect all localStorage keys used by TruOS
    const state = {
      'truos-academic':    localStorage.getItem('truos-academic')    || '[]',
      'truos-ac-filter':   localStorage.getItem('truos-ac-filter')   || 'all',
      'truos_schedule_v34': localStorage.getItem('truos_schedule_v34') || 'null',
    };

    // Read current HTML
    const html = document.documentElement.outerHTML;

    // Inject a bootstrap script just before </body> that restores state on load
    const bootstrap = `
<script id="truos-state-bootstrap">
(function(){
  const state = ${JSON.stringify(state)};
  Object.entries(state).forEach(([k,v]) => { if(v && v !== 'null') localStorage.setItem(k,v); });
  document.getElementById('truos-state-bootstrap').remove();
})();
<\/script>`;

    const parts = html.split('<\/body>');
    const exported = parts[0] + bootstrap + '\n<\/body>' + (parts[1] || '');

    // Download
    const blob = new Blob([exported], { type: 'text/html' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'TruOS-Unified.html';
    a.click();
    URL.revokeObjectURL(url);
    Shell.toast('STATE EXPORTED — OPEN ON ANY DEVICE');
  },

  toast(msg, isErr = false) {
    const t = document.getElementById('shell-toast');
    t.textContent = msg;
    t.className = 'show' + (isErr ? ' err' : '');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.className = '', 2400);
  },

  // Custom confirm modal — replaces window.confirm (Safari suppresses after first use)
  confirm(msg, onOk) {
    var existing = document.getElementById('shell-confirm-modal');
    if (existing) existing.remove();
    var overlay = document.createElement('div');
    overlay.id = 'shell-confirm-modal';
    overlay.style.cssText = 'position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,0.7);display:flex;align-items:flex-end;justify-content:center;padding-bottom:max(32px,env(safe-area-inset-bottom))';
    overlay.innerHTML = '<div style="background:#141516;border:1px solid rgba(255,255,255,0.12);border-radius:16px;padding:24px 20px;width:calc(100% - 40px);max-width:440px;font-family:var(--mono)">'
      + '<div style="font-size:12px;letter-spacing:1px;margin-bottom:20px;line-height:1.6;color:var(--text)">' + esc(msg) + '</div>'
      + '<div style="display:flex;gap:10px">'
      + '<button id="scm-cancel" style="flex:1;padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,0.12);background:transparent;color:var(--muted);font-family:var(--mono);font-size:11px;letter-spacing:1px;cursor:pointer">CANCEL</button>'
      + '<button id="scm-ok" style="flex:1;padding:12px;border-radius:10px;border:none;background:var(--red);color:#fff;font-family:var(--mono);font-size:11px;letter-spacing:1px;font-weight:700;cursor:pointer">CONFIRM</button>'
      + '</div></div>';
    document.body.appendChild(overlay);
    document.getElementById('scm-cancel').addEventListener('click', function() { overlay.remove(); });
    document.getElementById('scm-ok').addEventListener('click', function() { overlay.remove(); onOk(); });
    overlay.addEventListener('click', function(e) { if (e.target === overlay) overlay.remove(); });
  }
};

/* ── Shared utils ── */
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function mount(html) { document.getElementById('main-content').innerHTML = html; }
function nowClock() {
  return {
    time: new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }),
    date: new Date().toLocaleDateString([], { weekday:'short', month:'short', day:'numeric' }).toUpperCase()
  };
}

/* ═══════════════════════════════════════════
   MODULE 01 — INCOME OPTIMIZER
   Faithful port of TruOS v3.4 FLUID
   All calculation logic preserved exactly.
═══════════════════════════════════════════ */
const IncomeModule = {

  /* ── Exact CONFIG from v3.4 ── */
  CFG: {
    baseRate:    17.31,
    diffs:       { afternoon: 2.50, midnight: 2.75, weekend: 2.00 },
    tax:         0.192,
    otThreshold: 40,
    target:      2000
  },

  DAYS: ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],

  state: {
    weeks:      null,  // hydrated in init()
    activeWeek: 0
  },

  /* ── Core math — exact port from v3.4 ── */
  calculateShiftGross(isWeekend, cumHrsBefore, duration) {
    const { baseRate, diffs, otThreshold } = this.CFG;
    const wknd = isWeekend ? diffs.weekend : 0;
    const blockAHrs = Math.min(duration, 4.5);
    const blockBHrs = Math.max(0, duration - blockAHrs);

    const blocks = [
      { hrs: blockAHrs, rate: baseRate + diffs.afternoon + wknd },
      { hrs: blockBHrs, rate: baseRate + diffs.midnight  + wknd }
    ];

    let shiftTotal = 0;
    let runningCumHrs = cumHrsBefore;

    blocks.forEach(block => {
      if (block.hrs <= 0) return;
      const regInBlock = Math.min(block.hrs, Math.max(0, otThreshold - runningCumHrs));
      const otInBlock  = block.hrs - regInBlock;
      shiftTotal      += (regInBlock * block.rate) + (otInBlock * block.rate * 1.5);
      runningCumHrs   += block.hrs;
    });
    return shiftTotal;
  },

  toNet(gross) { return gross * (1 - this.CFG.tax); },

  emptyWeeks() {
    return [0,1].map(() =>
      this.DAYS.reduce((acc, d) => ({ ...acc, [d]: { type: 'off', hrs: 12 } }), {})
    );
  },

  /* ── Replaces React's useMemo weekCalcs ── */
  calcWeek(week) {
    let totalGross = 0, cumHrs = 0;
    const days = {};
    this.DAYS.forEach(day => {
      const s = week[day];
      if (s.type === 'off') { days[day] = { ...s, gross: 0, net: 0, otHrs: 0 }; return; }
      const gross   = this.calculateShiftGross(s.type === 'wknd', cumHrs, s.hrs);
      const otTotal = Math.max(0, (cumHrs + s.hrs) - this.CFG.otThreshold);
      const shiftOT = Math.min(s.hrs, otTotal);
      days[day]     = { ...s, gross, net: this.toNet(gross), otHrs: shiftOT };
      totalGross   += gross;
      cumHrs       += s.hrs;
    });
    return { days, totalGross, totalNet: this.toNet(totalGross), totalHrs: cumHrs };
  },

  getCombined(weekCalcs) {
    const gross = weekCalcs[0].totalGross + weekCalcs[1].totalGross;
    return { gross, net: this.toNet(gross), hrs: weekCalcs[0].totalHrs + weekCalcs[1].totalHrs };
  },

  fmt(n) { return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); },

  /* ── Storage ── */
  init() {
    // Hydrate fresh each mount — no stale IIFE state
    try {
      const raw = TruDB.get('truos_schedule_v34');
      this.state.weeks = raw ? JSON.parse(raw) : this.emptyWeeks();
      // Validate shape
      if (!Array.isArray(this.state.weeks) || this.state.weeks.length !== 2) {
        this.state.weeks = this.emptyWeeks();
      }
    } catch(e) {
      this.state.weeks = this.emptyWeeks();
    }
    this.state.activeWeek = 0;
    this.render();
    this.bindEvents();
    // Real-time sync — re-render when another device writes
    TruDB.on('truos_schedule_v34', function(data) {
      if (!Array.isArray(data) || data.length !== 2) return;
      IncomeModule.state.weeks = data;
      IncomeModule.render();
      IncomeModule.bindEvents();
    });
  },

  save() {
    TruDB.set('truos_schedule_v34', this.state.weeks);
  },

  updateDay(wi, day, type, hrs) {
    this.state.weeks[wi] = { ...this.state.weeks[wi], [day]: { type, hrs } };
    this.save();
    this.render();
    this.bindEvents();
  },

  updateClock() {
    const c = nowClock();
    const te = document.getElementById('inc-time');
    const de = document.getElementById('inc-date');
    if (te) te.textContent = c.time;
    if (de) de.textContent = c.date;
  },

  /* ── Render ── */
  render() {
    const weekCalcs  = this.state.weeks.map(w => this.calcWeek(w));
    const combined   = this.getCombined(weekCalcs);
    const remaining  = Math.max(0, this.CFG.target - combined.net);
    const pct        = Math.min(100, (combined.net / this.CFG.target) * 100);
    const aw         = this.state.activeWeek;
    const wc         = weekCalcs[aw];

    /* Week tabs */
    const tabsHTML = [0,1].map(wi => `
      <div class="week-tab${aw === wi ? ' active' : ''}" data-action="week-tab" data-wi="${wi}">
        WEEK ${wi+1} · ${weekCalcs[wi].totalHrs}H
      </div>`).join('');

    /* Day rows */
    const daysHTML = this.DAYS.map(day => {
      const s   = wc.days[day];
      const isOn = s.type !== 'off';
      const tagType = s.type === 'wknd' ? 'wknd' : s.type === 'base' ? 'base' : 'pickup';

      const typeChips = ['base','pickup','wknd'].map(t => {
        const active = s.type === t;
        const cls = active ? (t === 'wknd' ? 'chip active-w' : 'chip active') : 'chip';
        return `<button class="${cls}" data-action="set-type" data-day="${day}" data-type="${t}" data-hrs="${s.hrs}">${t[0].toUpperCase()}</button>`;
      }).join('');

      const hrsChips = isOn ? [8,12].map(h =>
        `<button class="chip${s.hrs===h?' active':''}" data-action="set-hrs" data-day="${day}" data-type="${s.type}" data-hrs="${h}">${h}H</button>`
      ).join('') : '';

      const removeBtn = isOn
        ? `<button class="chip-remove" data-action="remove-day" data-day="${day}">✕</button>`
        : '';

      return `
        <div class="day-row">
          <div>
            <div class="day-name${isOn ? ' on' : ''}">${day.substring(0,3).toUpperCase()}</div>
            ${isOn ? `<div class="tag-row">
              <span class="tag tag-${tagType}">${s.hrs}H ${s.type}</span>
              ${s.otHrs > 0 ? `<span class="tag tag-ot">${s.otHrs}H OT</span>` : ''}
            </div>` : ''}
          </div>
          <div>
            <div class="chip-row">${typeChips}${removeBtn}</div>
            ${isOn ? `<div class="chip-row">${hrsChips}</div>` : ''}
          </div>
          <div class="day-earn${isOn ? ' on' : ''}">
            ${isOn ? `$${Math.round(s.net)}` : '—'}
          </div>
        </div>`;
    }).join('');

    const gapColor = remaining > 0 ? 'var(--red)' : 'var(--green)';
    const gapText  = remaining > 0 ? `GAP: -$${this.fmt(remaining)}` : '✓ GOAL REACHED';

    mount(`
      <header class="mod-header">
        <div>
          <span class="sys-label">TruOS · Module 01</span>
          <h1 class="mod-title">Income<br><em>Optimizer</em></h1>
        </div>
        <div style="text-align:right">
          <div class="sys-label" id="inc-date"></div>
          <div style="font-family:var(--mono);font-size:18px;font-weight:700;" id="inc-time"></div>
        </div>
      </header>

      <div class="inc-wrap">

        <!-- Progress card -->
        <div class="progress-card">
          <div class="pc-top">
            <div>
              <div class="sys-label" style="margin-bottom:5px">Biweekly Net</div>
              <div class="pc-net"><sup>$</sup>${this.fmt(combined.net)}</div>
            </div>
            <div class="pc-target">
              <div class="pc-target-val">$${this.CFG.target}</div>
              <div class="sys-label" style="margin-top:2px">target</div>
            </div>
          </div>
          <div class="v-bar"><div class="v-fill" style="width:${pct}%"></div></div>
          <div class="v-meta">
            <span>${pct.toFixed(1)}% complete · ${combined.hrs}H scheduled</span>
            <span style="color:${gapColor}">${gapText}</span>
          </div>
        </div>

        <!-- Stats -->
        <div class="stats-bar" style="padding:0 0 16px">
          <div class="stat">
            <span class="stat-val" style="color:var(--green)">$${Math.round(combined.net)}</span>
            <span class="stat-sub">Net Pay</span>
          </div>
          <div class="stat">
            <span class="stat-val" style="color:var(--amber)">$${Math.round(combined.gross)}</span>
            <span class="stat-sub">Gross</span>
          </div>
          <div class="stat">
            <span class="stat-val" style="color:var(--muted)">${combined.hrs}H</span>
            <span class="stat-sub">Hours</span>
          </div>
        </div>

        <!-- Week tabs + clear -->
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div class="sys-label">Schedule Builder</div>
          <button class="clear-btn" data-action="clear-all">CLEAR</button>
        </div>
        <div class="week-tabs">${tabsHTML}</div>

        <!-- Day rows -->
        <div id="days-grid">${daysHTML}</div>

      </div>
    `);

    this.updateClock();
  },

  bindEvents() {
    const wrap = document.getElementById('main-content');
    if (!wrap || wrap._incBound) return;
    wrap._incBound = true;

    wrap.addEventListener('click', e => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const { action, wi, day, type, hrs } = btn.dataset;
      const aw = this.state.activeWeek;

      if (action === 'week-tab') {
        this.state.activeWeek = +wi;
        this.render(); this.bindEvents(); return;
      }
      if (action === 'clear-all') {
        Shell.confirm('Clear both weeks?', () => {
          this.state.weeks = this.emptyWeeks();
          this.save(); this.render(); this.bindEvents();
        });
        return;
      }
      if (action === 'set-type') {
        this.updateDay(aw, day, type, +hrs); return;
      }
      if (action === 'set-hrs') {
        this.updateDay(aw, day, type, +hrs); return;
      }
      if (action === 'remove-day') {
        this.updateDay(aw, day, 'off', 12); return;
      }
    });
  },

  teardown() {
    const wrap = document.getElementById('main-content');
    if (wrap) wrap._incBound = false;
  }
};

/* ═══════════════════════════════════════════
   MODULE 02 — ACADEMIC TRACKER (Canvas Optimized)
═══════════════════════════════════════════ */
const AcademicModule = {
  CFG: { class1: "MAT 151 (Math)", class2: "PSY 101 (Psych)" },
  state: { assignments: [], filter: 'all' },

  init() {
    try {
      const raw = TruDB.get('truos-academic');
      this.state.assignments = raw ? JSON.parse(raw) : [];
    } catch(e) {
      this.state.assignments = [];
    }
    this.state.filter = TruDB.get('truos-ac-filter') || 'all';
    this.render();
    this.bindEvents();
    // Real-time sync — re-render when another device writes
    TruDB.on('truos-academic', data => {
      this.state.assignments = Array.isArray(data) ? data : [];
      this.render();
      this.bindEvents();
    });
  },

  importICS(text) {
    const events = [];
    const blocks = text.split('BEGIN:VEVENT');
    blocks.shift();

    blocks.forEach(block => {
      const titleMatch = block.match(/SUMMARY:(.*(?:\r?\n\s.*)*)/);
      let fullTitle = titleMatch ? titleMatch[1].replace(/\r?\n\s/g, '').trim() : "Untitled";
      let displayTitle = fullTitle.split('[')[0].trim();

      const dateMatch = block.match(/DTSTART[:;].*?(\d{8})/);
      let dueStr = "";
      if (dateMatch) {
        const d = dateMatch[1];
        dueStr = `${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}T23:59:00`;
      }

      const cls = fullTitle.includes("MAT 151") ? "c1" : "c2";

      if (dueStr && !fullTitle.includes("OFFICE HOURS")) {
        events.push({
          id: 'ac-' + Math.random().toString(36).substr(2, 9),
          title: displayTitle,
          due: dueStr,
          cls: cls,
          done: false
        });
      }
    });

    const existing = JSON.parse(TruDB.get('truos-academic') || '[]');
    const combined = [...existing, ...events].reduce((acc, current) => {
      const isDup = acc.find(item => item.title === current.title && item.due === current.due && item.cls === current.cls);
      if (!isDup) acc.push(current);
      return acc;
    }, []);

    this.state.assignments = combined;
    this.save();
    Shell.toast(`SYNCED: ${events.length} CANVAS TASKS`);
  },

  save() {
    TruDB.set('truos-academic', this.state.assignments);
    TruDB.set('truos-ac-filter', this.state.filter);
    this.render();
    this.bindEvents();
  },

  urgency(due, done) {
    if (done) return 'done';
    const hours = (new Date(due) - new Date()) / 36e5;
    if (hours < 0) return 'overdue';
    if (hours < 24) return 'today';
    if (hours < 72) return 'soon';
    return 'upcoming';
  },

  // Returns week number (1-based) relative to the earliest due date in dataset
  _weekNum(dueDate, minDate) {
    return Math.floor((new Date(dueDate) - minDate) / (7 * 24 * 36e5)) + 1;
  },

  // Build a single card HTML string
  _card(a) {
    const u  = this.urgency(a.due, a.done);
    const dt = new Date(a.due).toLocaleDateString([], {month:'short', day:'numeric'});
    return `
      <div class="card ${a.done ? 'done' : u}">
        <div class="checkbox ${a.done ? 'checked' : ''}" onclick="AcademicModule.toggle('${a.id}')">${a.done ? '✓' : ''}</div>
        <div class="card-body">
          <div class="card-title">${esc(a.title)}</div>
          <div class="card-meta">${a.cls === 'c1' ? 'MAT 151' : 'PSY 101'} · Due ${dt}</div>
        </div>
        <button class="btn-del" onclick="AcademicModule.remove('${a.id}')">✕</button>
      </div>`;
  },

  render() {
    const all = this.state.assignments;

    // Determine anchor date (earliest due in full dataset, ignoring filter)
    const dates = all.map(a => new Date(a.due)).filter(d => !isNaN(d));
    const minDate = dates.length ? new Date(Math.min(...dates)) : new Date();

    // Apply class filter for display
    const visible = all.filter(a => {
      if (this.state.filter === 'c1') return a.cls === 'c1';
      if (this.state.filter === 'c2') return a.cls === 'c2';
      return true;
    });

    // Split pending vs done
    const pending = visible.filter(a => !a.done).sort((a,b) => new Date(a.due) - new Date(b.due));
    const done    = visible.filter(a => a.done).sort((a,b) => new Date(a.due) - new Date(b.due));

    // Group pending by week number
    const weekMap = new Map();
    pending.forEach(a => {
      const wk = this._weekNum(a.due, minDate);
      if (!weekMap.has(wk)) weekMap.set(wk, []);
      weekMap.get(wk).push(a);
    });

    // Build week progress denominator from ALL (not just filtered) per week
    const weekTotals = new Map();
    all.forEach(a => {
      const wk = this._weekNum(a.due, minDate);
      if (!weekTotals.has(wk)) weekTotals.set(wk, { total: 0, done: 0 });
      weekTotals.get(wk).total++;
      if (a.done) weekTotals.get(wk).done++;
    });

    // Header — next due countdown
    const _nextDue = pending.length > 0 ? pending[0] : null;
    let _countdownHTML = '';
    if (_nextDue) {
      const _msLeft = new Date(_nextDue.due) - new Date();
      const _overdue = _msLeft < 0;
      const _abs = Math.abs(_msLeft);
      const _d = Math.floor(_abs / 864e5);
      const _h = Math.floor((_abs % 864e5) / 36e5);
      const _m = Math.floor((_abs % 36e5) / 6e4);
      const _timeStr = _d > 0 ? `${_d}d ${_h}h` : `${_h}h ${_m}m`;
      const _color = _overdue ? 'var(--red)' : _d === 0 ? '#f5a623' : 'var(--green)';
      const _label = _overdue ? 'OVERDUE BY' : 'NEXT DUE IN';
      _countdownHTML = `<div style="text-align:right">
        <div class="sys-label">${_label}</div>
        <div style="font-family:var(--mono);font-size:22px;font-weight:700;color:${_color};line-height:1.1">${_timeStr}</div>
        <div class="sys-label" style="margin-top:2px;max-width:140px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${_nextDue.title}</div>
      </div>`;
    } else {
      _countdownHTML = `<div style="text-align:right"><div style="font-family:var(--mono);font-size:13px;color:var(--green)">ALL CLEAR</div></div>`;
    }

    let html = `
      <header class="mod-header">
        <div>
          <div class="sys-label">ASSIGNMENTS</div>
          <div style="font-family:var(--mono);font-size:22px;font-weight:700;line-height:1.1">${pending.length} PENDING</div>
        </div>
        ${_countdownHTML}
      </header>
      <div class="pill-row">
        <button class="pill ${this.state.filter==='all'?'active':''}" onclick="AcademicModule.setFilter('all')">ALL</button>
        <button class="pill ${this.state.filter==='c1'?'active':''}" onclick="AcademicModule.setFilter('c1')">MATH</button>
        <button class="pill ${this.state.filter==='c2'?'active':''}" onclick="AcademicModule.setFilter('c2')">PSYCH</button>
        <button class="pill p-amber" onclick="document.getElementById('ics-input').click()">+ IMPORT ICS</button>
        <input type="file" id="ics-input" hidden onchange="AcademicModule.handleFile(this)">
      </div>
      <div class="list-area">`;

    if (pending.length === 0 && done.length === 0) {
      html += `<div class="empty-state">NO ASSIGNMENTS FOUND</div>`;
    }

    // Render week groups
    const sortedWeeks = [...weekMap.keys()].sort((a,b) => a - b);
    sortedWeeks.forEach(wk => {
      const items  = weekMap.get(wk);
      const totals = weekTotals.get(wk) || { total: items.length, done: 0 };
      const pct    = totals.total > 0 ? Math.round((totals.done / totals.total) * 100) : 0;
      const barW   = Math.min(100, pct);
      const barColor = pct === 100 ? 'background:var(--green)' : '';

      html += `
        <div class="week-header">
          <div class="week-label">
            <span>Week ${wk}</span>
            <span style="color:var(--muted);font-size:9px">${totals.done}/${totals.total} done</span>
          </div>
          <div class="week-progress-row">
            <div class="week-bar-track">
              <div class="week-bar-fill" style="width:${barW}%;${barColor}"></div>
            </div>
            <span class="week-bar-label">${pct}%</span>
          </div>
        </div>`;

      items.forEach(a => { html += this._card(a); });
    });

    // Completed section
    if (done.length > 0) {
      const isOpen = this.state.completedOpen || false;
      html += `
        <div class="completed-toggle" onclick="AcademicModule.toggleCompleted()">
          <span class="completed-caret ${isOpen ? 'open' : ''}">▶</span>
          COMPLETED (${done.length})
          <button class="clear-btn" style="margin-left:auto" onclick="event.stopPropagation();AcademicModule.purgeCompleted()">PURGE</button>
        </div>`;
      if (isOpen) {
        html += `<div class="completed-list">`;
        done.forEach(a => { html += this._card(a); });
        html += `</div>`;
      }
    }

    html += `</div>`;
    mount(html);
  },

  toggleCompleted() {
    this.state.completedOpen = !this.state.completedOpen;
    this.render();
  },

  purgeCompleted() {
    Shell.confirm('Remove all completed assignments?', () => {
      this.state.assignments = this.state.assignments.filter(a => !a.done);
      this.state.completedOpen = false;
      this.save();
      Shell.toast('COMPLETED TASKS PURGED');
    });
  },

  setFilter(f) { this.state.filter = f; TruDB.set('truos-ac-filter', f); this.render(); },
  toggle(id) {
    const a = this.state.assignments.find(x => x.id === id);
    if (a) a.done = !a.done;
    this.save();
  },
  remove(id) {
    this.state.assignments = this.state.assignments.filter(x => x.id !== id);
    this.save();
  },
  handleFile(input) {
    const reader = new FileReader();
    reader.onload = (e) => this.importICS(e.target.result);
    reader.readAsText(input.files[0]);
  },
  bindEvents() {},
  updateClock() { this.init(); },
  teardown() { document.querySelectorAll('#ac-panel, #ac-fab').forEach(el => el.remove()); }
};

const DashboardModule = {

  // Reuse Income math directly — single source of truth
  _incomeStats() {
    const CFG = IncomeModule.CFG;
    try {
      const raw = localStorage.getItem('truos_schedule_v34');
      const weeks = raw ? JSON.parse(raw) : IncomeModule.emptyWeeks();
      if (!Array.isArray(weeks) || weeks.length !== 2) return { net: 0, hrs: 0, pct: 0, gap: CFG.target };
      const calcs  = weeks.map(w => IncomeModule.calcWeek(w));
      const gross  = calcs[0].totalGross + calcs[1].totalGross;
      const net    = IncomeModule.toNet(gross);
      const hrs    = calcs[0].totalHrs   + calcs[1].totalHrs;
      const pct    = Math.min(100, (net / CFG.target) * 100);
      const gap    = Math.max(0, CFG.target - net);
      return { net, hrs, pct, gap, target: CFG.target };
    } catch { return { net: 0, hrs: 0, pct: 0, gap: CFG.target, target: CFG.target }; }
  },

  _academicStats() {
    try {
      const raw  = localStorage.getItem('truos-academic');
      const data = raw ? JSON.parse(raw) : [];
      const now  = new Date();
      const in72 = new Date(now.getTime() + 72 * 36e5);
      const overdue  = data.filter(a => !a.done && new Date(a.due) < now);
      const urgent   = data.filter(a => !a.done && new Date(a.due) >= now && new Date(a.due) <= in72);
      const done     = data.filter(a => a.done).length;
      const total    = data.length;
      const upcoming = data
        .filter(a => !a.done && new Date(a.due) >= now)
        .sort((a, b) => new Date(a.due) - new Date(b.due));
      const next = upcoming[0] || null;
      return { overdue: overdue.length, urgent: urgent.length, done, total, next };
    } catch { return { overdue: 0, urgent: 0, done: 0, total: 0, next: null }; }
  },

  _tradingLocked(overdueCount) {
    return overdueCount > 0;
  },

  // Status line — reads the full system state and picks a message
  _statusLine(income, academic, tradingLocked) {
    const incomeGood   = income.pct  >= 100;
    const academicGood = academic.overdue === 0;

    if (incomeGood && academicGood)
      return { text: 'ALL SYSTEMS NOMINAL', color: 'var(--green)' };
    if (!academicGood && income.gap > 500)
      return { text: `DEBT ON TWO FRONTS · ${academic.overdue} OVERDUE · $${Math.round(income.gap)} GAP`, color: 'var(--red)' };
    if (!academicGood)
      return { text: `ACADEMIC DEBT DETECTED · ${academic.overdue} OVERDUE TASK${academic.overdue !== 1 ? 'S' : ''}`, color: 'var(--red)' };
    if (academic.total - academic.done > 5)
      return { text: 'WARNING: HIGH ACADEMIC LOAD', color: 'var(--amber)' };
    if (income.gap > 0)
      return { text: `$${Math.round(income.gap)} TO TARGET · SCHEDULE MORE SHIFTS`, color: 'var(--amber)' };

  /* ── Netting Engine ── */
  _netTransfers(stmt) {
    var accts = Object.values(stmt).filter(Boolean);
    var out = accts.reduce(function(s,a){ return s+(a.transfersOut||0); }, 0);
    var ins = accts.reduce(function(s,a){ return s+(a.transfersIn||0); }, 0);
    return { out: out, ins: ins, netted: Math.min(out, ins) };
  },

  /* ── Period Stats — income-based ── */
  _periodStats(stmt) {
    var FM = this;
    var accts = Object.values(stmt).filter(Boolean);
    var netting = this._netTransfers(stmt);
    var totalIncome = 0, totalFees = 0;
    var unifiedCats = {};
    this.CATS.forEach(function(c){ unifiedCats[c] = 0; });
    accts.forEach(function(a){
      totalIncome += (a.income || 0);
      totalFees   += (a.fees   || 0);
      FM.CATS.forEach(function(c){ unifiedCats[c] += (a.spending[c] || 0); });
    });
    // True income = income minus transfers received (avoid double count)
    var trueIncome = totalIncome - netting.ins;
    var totalSpend = Object.values(unifiedCats).reduce(function(s,v){ return s+v; },0) + totalFees;
    var days = (accts[0] && accts[0].meta && accts[0].meta.days) || 30;
    var net = trueIncome - totalSpend;
    var burnRate = totalSpend / days;
    var savingsRate = trueIncome > 0 ? (net / trueIncome) * 100 : 0;
    return { trueIncome: trueIncome, totalSpend: totalSpend, totalFees: totalFees,
             net: net, burnRate: burnRate, savingsRate: savingsRate,
             unifiedCats: unifiedCats, netting: netting, days: days };
  },

  /* ── Calendar overlap detection ── */
  _activeZone(stmt) {
    var accts = Object.values(stmt).filter(Boolean);
    if (accts.length < 2) return null;
    var starts = accts.map(function(a){ return a.meta && a.meta.stmt_start ? a.meta.stmt_start : ''; }).filter(Boolean);
    var ends   = accts.map(function(a){ return a.meta && a.meta.stmt_end   ? a.meta.stmt_end   : ''; }).filter(Boolean);
    if (starts.length < 2 || ends.length < 2) return null;
    var overlapStart = starts.reduce(function(a,b){ return a>b?a:b; });
    var overlapEnd   = ends.reduce(function(a,b){ return a<b?a:b; });
    if (overlapStart >= overlapEnd) return null;
    var ms = new Date(overlapEnd) - new Date(overlapStart);
    var days = Math.round(ms / 86400000) + 1;
    return { start: overlapStart, end: overlapEnd, days: days };
  },

  /* ── Income-based Pace (current month only) ── */
  _pace(stats, periodKey) {
    var stmt = this._load().statements[periodKey];
    var ref  = stmt && (stmt.nfcu || stmt.wf);
    if (!ref || !ref.meta || !ref.meta.cal_start) return null;
    var now      = new Date();
    var calEnd   = new Date(ref.meta.cal_end);
    var calStart = new Date(ref.meta.cal_start);
    // Only show live pace if today is within the calendar window
    if (now < calStart || now > calEnd) return null;
    var totalDays = ref.meta.days || 28;
    var elapsed   = Math.min(now.getDate(), totalDays);
    var dayPct    = (elapsed / totalDays) * 100;
    var spendPct  = stats.trueIncome > 0 ? (stats.totalSpend / stats.trueIncome) * 100 : 0;
    var delta     = spendPct - dayPct;
    var status    = delta > 10 ? 'overpace' : delta > 0 ? 'watch' : 'ontrack';
    return { dayPct: dayPct, spendPct: spendPct, delta: delta, status: status };

    var cs = Object.values(curr).filter(Boolean).reduce(function(s,a){ return s+(a.spending['Subscriptions']||0); },0);
    var ps = Object.values(prev).filter(Boolean).reduce(function(s,a){ return s+(a.spending['Subscriptions']||0); },0);

        detail:'Charged 2+ consecutive periods. Review each line: still needed?' }];

      else
        flags.push({ type:'green', icon:'🟢', title:'PACE ON TRACK · '+pace.spendPct.toFixed(1)+'% SPENT vs '+pace.dayPct.toFixed(1)+'% OF MONTH',
          detail:'Spending is in line with how far through the month you are.' });
    }

    // Dining + shift cost
    var dining = stats.unifiedCats['Dining'] || 0;
    if (dining > 0) {
      var shiftsUsed = (dining / netPerShift).toFixed(1);
      var diningPct  = stats.totalSpend > 0 ? (dining / stats.totalSpend) * 100 : 0;
      flags.push({ type: diningPct > 25 ? 'amber' : 'blue', icon:'🍽️',
        title: diningPct > 25 ? 'DINING OVER 25% · '+diningPct.toFixed(1)+'% OF SPEND' : 'DINING · '+diningPct.toFixed(1)+'% OF SPEND',
        detail: '$'+dining.toFixed(2)+' on dining. Cut 50% = +$'+(dining*0.5).toFixed(0)+'/mo recovered.',
        shiftCost: '🏥 Cost: '+shiftsUsed+' Corewell 12hr shifts ($'+netPerShift.toFixed(2)+' net/shift)' });
    }

    // Fees
    if (stats.totalFees > 0)
      flags.push({ type:'red', icon:'💸', title:'BANK FEES · $'+stats.totalFees.toFixed(2),
        detail:'ATM charges or transaction fees. 100% avoidable.' });

    // Netting info
    if (stats.netting.netted > 0)
      flags.push({ type:'blue', icon:'🔀', title:'TRANSFER NETTING · $'+stats.netting.netted.toFixed(2)+' ZEROED',
        detail:'Cross-account flows removed. Figures reflect true discretionary spend.' });

    // Burn rate
    flags.push({ type:'blue', icon:'📊', title:'DAILY BURN · $'+stats.burnRate.toFixed(2)+'/day',
      detail:'Daily operational cost × 30 = $'+(stats.burnRate*30).toFixed(0)+' projected monthly.' });

    return flags.concat(this._spikeFlags(data, key)).concat(this._subFlags(data, key));
  },

  _activePeriod: null,
  _panelOpen: false,
  _addAcct: 'nfcu',
  _cogOpen: false,
  _advancedOpen: false,

  init() {
    var FM   = this;
    var data = this._load();
    var keys = Object.keys(data.statements).sort();
    if (!this._activePeriod || !data.statements[this._activePeriod])
      this._activePeriod = keys[keys.length - 1];

    var stmt  = data.statements[this._activePeriod];
    var stats = this._periodStats(stmt);
    var pace  = this._pace(stats, this._activePeriod);
    var flags = this._allFlags(data, this._activePeriod, stats, pace);
    var zone  = this._activeZone(stmt);
    var zts   = this._zelleData(stmt);
    var netPerShift = this._netPerShift();

    var netColor  = stats.net >= 0 ? 'var(--green)' : 'var(--red)';
    var srColor   = stats.savingsRate >= 20 ? 'var(--green)' : stats.savingsRate >= 10 ? 'var(--amber)' : 'var(--red)';
    var burnColor = pace ? (pace.status==='overpace' ? 'var(--red)' : pace.status==='watch' ? 'var(--amber)' : 'var(--green)') : 'var(--amber)';
    var paceLabel = pace ? (pace.status==='overpace' ? ' ⚠ OVERPACE' : pace.status==='watch' ? ' ▲ WATCH' : ' ✓ ON TRACK') : '';

    // Period pills
    var periodPills = keys.map(function(k) {
      var ref = data.statements[k].nfcu || data.statements[k].wf;
      var lbl = ref && ref.meta && ref.meta.period ? ref.meta.period.replace(' 2026','') : k;
      return '<div class="pill'+(k===FM._activePeriod?' active':'')+'" onclick="FinanceModule._setPeriod(\''+k+'\')">'+lbl+'</div>';
    }).join('');

    // Compact account header lines
    var acctLines = Object.entries(this.ACCTS).map(function(entry) {
      var id = entry[0], def = entry[1];
      var a  = stmt[id];
      var name = (data.accountNames && data.accountNames[id]) || def.label;
      if (!a) return '<div class="fin-acct-line"><span class="fin-acct-line-name" style="color:'+def.color+'40">'+name+'</span><span class="fin-acct-line-detail">no data</span></div>';
      var spent = FM.CATS.reduce(function(s,c){ return s+(a.spending[c]||0); },0) + (a.fees||0);
      return '<div class="fin-acct-line"><span class="fin-acct-line-name" style="color:'+def.color+'">'+name+'</span><span class="fin-acct-line-detail">$'+(a.startBal||0).toFixed(0)+' → $'+(a.endBal||0).toFixed(0)+' &nbsp;·&nbsp; +$'+a.income.toFixed(0)+' in &nbsp;·&nbsp; −$'+spent.toFixed(0)+' out</span></div>';
    }).join('');
    var nettedLine = stats.netting.netted > 0 ? '<div class="fin-acct-netted">⇌ $'+stats.netting.netted.toFixed(2)+' transfers netted</div>' : '';
    var zoneLabel  = zone ? '<div class="fin-active-zone">ACTIVE ZONE '+zone.start+' → '+zone.end+' · '+zone.days+' days</div>' : '';

    // Pace bar
    var paceBarHTML = '';
    if (pace) {
      var sw = Math.min(pace.spendPct,100).toFixed(1);
      var dw = Math.min(pace.dayPct,100).toFixed(1);
      var bc = pace.status==='overpace' ? 'var(--red)' : pace.status==='watch' ? 'var(--amber)' : 'var(--green)';
      paceBarHTML = '<div class="fin-pace-label"><span style="color:'+bc+'">SPEND '+pace.spendPct.toFixed(1)+'%</span><span style="color:var(--muted)">DAY '+pace.dayPct.toFixed(1)+'% OF MONTH</span></div><div class="fin-pace-bar"><div class="fin-pace-spend" style="width:'+sw+'%;background:'+bc+'"></div><div class="fin-pace-day-marker" style="left:'+dw+'%"></div></div>';
    }

    // Category bars
    var maxSpend = Math.max.apply(null, Object.values(stats.unifiedCats).concat([1]));
    var catRows = this.CATS.map(function(cat) {
      var total = stats.unifiedCats[cat] || 0;
      if (total === 0) return '';
      var color   = FM.CAT_COLORS[cat];
      var pctMax  = (total / maxSpend) * 100;
      var subBars = Object.entries(FM.ACCTS).map(function(entry) {
        var id = entry[0], def = entry[1];
        var a  = stmt[id];
        if (!a) return '';
        var av = a.spending[cat] || 0;
        if (av === 0) return '';
        return '<div class="fin-cat-bar-track" title="'+(( data.accountNames && data.accountNames[id]) || def.label)+': $'+av.toFixed(2)+'"><div class="fin-cat-bar-fill" style="width:'+((av/maxSpend)*100).toFixed(1)+'%;background:'+def.color+';opacity:0.55"></div></div>';
      }).filter(Boolean).join('');
      return '<div class="fin-cat-row"><div class="fin-cat-top"><div class="fin-cat-name">'+cat+'</div><div class="fin-cat-dual-bar"><div class="fin-cat-bar-track"><div class="fin-cat-bar-fill" style="width:'+pctMax.toFixed(1)+'%;background:'+color+'"></div></div>'+subBars+'</div><div class="fin-cat-amt" style="color:'+color+'">$'+total.toFixed(0)+'</div></div></div>';
    }).filter(Boolean).join('');

    // Flags HTML
    var flagsHTML = flags.length ? flags.map(function(f) {
      var sc = f.shiftCost ? '<div class="fin-shift-cost">'+f.shiftCost+'</div>' : '';
      return '<div class="fin-flag flag-'+f.type+'"><span class="fin-flag-icon">'+f.icon+'</span><div class="fin-flag-body"><div class="fin-flag-title">'+f.title+'</div><div class="fin-flag-detail">'+f.detail+sc+'</div></div></div>';
    }).join('') : '<div class="empty-state">ALL CLEAR</div>';

    // Zelle-to-self tracker
    var ztsHTML = '';
    if (zts && zts.transfers && zts.transfers.length) {
      var maxAmt = Math.max.apply(null, zts.transfers.map(function(t){ return t.amt; }));
      var rows = zts.transfers.map(function(t) {
        var pct = (t.amt / maxAmt * 100).toFixed(0);
        return '<div class="fin-zts-row"><span class="fin-zts-label">'+t.date+'</span><div class="fin-zts-bar-track"><div class="fin-zts-bar-fill" style="width:'+pct+'%"></div></div><span class="fin-zts-amt">$'+t.amt.toFixed(0)+'</span></div>';
      }).join('');
      var totalSent = zts.sent || zts.received || 0;
      var count     = zts.transfers.length;
      var avgAmt    = (totalSent / count).toFixed(2);
      var freq      = (28 / count).toFixed(1);
      ztsHTML = '<div class="fin-zts-wrap">'+rows+'<div class="fin-zts-summary">'+count+' transfers · $'+totalSent.toFixed(2)+' total · avg $'+avgAmt+' · every '+freq+' days<br><span class="fin-zts-warning">⚠ Reactive pattern detected.</span> 1 weekly transfer of ~$'+Math.ceil(totalSent/4)+' replaces '+count+' micro-transfers.</div></div>';
    }

    // 3-month compare bars
    var recent3 = keys.slice(-3);
    var maxNet  = Math.max.apply(null, recent3.map(function(k){ return Math.abs(FM._periodStats(data.statements[k]).net); }).concat([1]));
    var compareBars = recent3.map(function(k) {
      var s   = FM._periodStats(data.statements[k]);
      var ht  = (Math.abs(s.net) / maxNet * 100);
      var col = s.net >= 0 ? 'var(--green)' : 'var(--red)';
      var ref = data.statements[k].nfcu || data.statements[k].wf;
      var lbl = ref && ref.meta && ref.meta.period ? ref.meta.period.replace(' 2026','').substring(0,3).toUpperCase() : k;
      return '<div class="fin-cbar-wrap"><div class="fin-cbar-amt" style="color:'+col+'">'+(s.net>=0?'+':'')+'$'+Math.abs(s.net).toFixed(0)+'</div><div class="fin-cbar" style="height:'+ht+'%;background:'+col+';opacity:0.75"></div><div class="fin-cbar-label">'+lbl+'</div></div>';
    }).join('');

    // Quick Add panel cat inputs
    var catInputs = this.CATS.map(function(c) {
      return '<div class="fin-cat-input-row"><div class="fin-cat-input-label">'+c+'</div><input type="number" id="fin-cat-'+c.replace(/[\s\/]/g,'_')+'" placeholder="0.00" /></div>';
    }).join('');

    var ref = stmt.nfcu || stmt.wf;
    var periodLabel = ref && ref.meta ? ref.meta.period : this._activePeriod;

    mount(
      '<header class="mod-header">'+
        '<div><span class="sys-label">TruOS · Module 05</span><h1 class="mod-title">Finance<br><em>Audit</em></h1></div>'+
        '<div style="display:flex;align-items:flex-start;gap:10px">'+
          '<div style="text-align:right">'+
            '<div class="sys-label" style="margin-bottom:4px">Burn Rate</div>'+
            '<div style="font-family:var(--mono);font-size:18px;font-weight:700;color:'+burnColor+'">$'+stats.burnRate.toFixed(2)+'<span style="font-size:9px;color:'+burnColor+'">'+paceLabel+'</span></div>'+
          '</div>'+
          '<button class="fin-cog-btn" onclick="FinanceModule._openCog()">⚙</button>'+
        '</div>'+
      '</header>'+
      '<div class="fin-wrap">'+
        '<div class="fin-period-row">'+periodPills+'<div class="pill" onclick="FinanceModule._openPanel(\'nfcu\')">+ Add</div><div class="pill" onclick="FinanceModule._openUpload()" style="border-color:var(--accent);color:var(--accent)">⬆ AI Upload</div></div>'+
        '<div class="fin-acct-header-bar">'+acctLines+nettedLine+zoneLabel+'</div>'+
        paceBarHTML+
        '<div class="fin-phase-head">Spend Breakdown · <span>'+periodLabel+'</span></div>'+
        '<div class="fin-cats">'+catRows+'</div>'+
        '<div class="fin-phase-head">Phase 3 · <span>Audit Flags</span></div>'+
        '<div class="fin-flags">'+flagsHTML+'</div>'+
        (ztsHTML ? '<div class="fin-phase-head">Zelle-to-Self · <span>WF → NFCU Flow</span></div>'+ztsHTML : '')+
        '<div class="fin-phase-head">3-Month Net Trend</div>'+
        '<div class="fin-compare-bars">'+compareBars+'</div>'+
      '</div>'+
      '<div class="fin-p4-sticky">'+
        '<div class="fin-p4-metric"><span class="fin-p4-val" style="color:'+srColor+'">'+stats.savingsRate.toFixed(1)+'%</span><span class="fin-p4-sub">Savings Rate</span></div>'+
        '<div class="fin-p4-metric"><span class="fin-p4-val" style="color:'+burnColor+'">$'+stats.burnRate.toFixed(2)+'</span><span class="fin-p4-sub">Burn / Day</span></div>'+
        '<div class="fin-p4-metric"><span class="fin-p4-val" style="color:'+netColor+';font-size:13px">'+(stats.net>=0?'+':'')+'$'+Math.abs(stats.net).toFixed(0)+'</span><span class="fin-p4-sub">Net Period</span></div>'+
      '</div>'+
      '<div class="slide-panel" id="fin-panel">'+
        '<div class="fin-panel-title">+ Quick <span>Statement</span></div>'+
        '<div class="fin-section-head">Account</div>'+
        '<div class="fin-acct-select">'+
          '<div class="fin-acct-opt'+(this._addAcct==='nfcu'?' selected':'')+'" onclick="FinanceModule._setAddAcct(\'nfcu\')">Navy Federal</div>'+
          '<div class="fin-acct-opt'+(this._addAcct==='wf'?' selected':'')+'" onclick="FinanceModule._setAddAcct(\'wf\')">Wells Fargo</div>'+
        '</div>'+
        '<input id="fin-period-label" placeholder="e.g. March 2026" />'+
        '<input id="fin-cal-start" placeholder="Cal Start (YYYY-MM-DD)" />'+
        '<input id="fin-cal-end"   placeholder="Cal End   (YYYY-MM-DD)" />'+
        '<input id="fin-income" type="number" placeholder="Total Income ($)" />'+
        '<input id="fin-total-spend" type="number" placeholder="Total Spend ($)" />'+
        '<input id="fin-dining-quick" type="number" placeholder="Dining ($)" />'+
        '<button class="fin-advanced-toggle" onclick="FinanceModule._toggleAdvanced()">▸ Advanced breakdown</button>'+
        '<div class="fin-advanced-section'+(this._advancedOpen?' open':'')+'" id="fin-advanced">'+
          '<div style="display:flex;gap:8px"><input id="fin-fees" type="number" placeholder="Fees ($)" style="flex:1" /><input id="fin-start-bal" type="number" placeholder="Start Bal ($)" style="flex:1" /></div>'+
          '<div style="display:flex;gap:8px"><input id="fin-end-bal" type="number" placeholder="End Bal ($)" style="flex:1" /><input id="fin-xfer-out" type="number" placeholder="Transfers Out ($)" style="flex:1" /></div>'+
          '<input id="fin-xfer-in" type="number" placeholder="Transfers In ($)" />'+
          '<div class="fin-section-head">Per Category</div>'+

        '</div>'+
        '<button class="fin-save-btn" onclick="FinanceModule._saveStatement()">SAVE STATEMENT</button>'+
      '</div>'
    );
  },

  _setPeriod(k) { this._activePeriod = k; this.init(); },
  _setAddAcct(id) { this._addAcct = id; this.init(); setTimeout(function(){ FinanceModule._openPanel(id); },50); },
  _toggleAdvanced() {
    this._advancedOpen = !this._advancedOpen;
    var el  = document.getElementById('fin-advanced');
    var btn = document.querySelector('.fin-advanced-toggle');
    if (el)  el.classList.toggle('open', this._advancedOpen);
    if (btn) btn.textContent = (this._advancedOpen ? '▾ ' : '▸ ') + 'Advanced breakdown';
  },
  _openPanel(id) {
    if (id) this._addAcct = id;
    this._panelOpen = true;
    var el = document.getElementById('fin-panel');
    if (el) el.classList.add('open');
  },
  _closePanel() {
    this._panelOpen = false;
    var el = document.getElementById('fin-panel');
    if (el) el.classList.remove('open');
  },

  /* ── Settings Cog ── */
  _openCog() {
    this._cogOpen = true;
    var data = this._load();
    var names = data.accountNames || {};
    var modal = document.createElement('div');
    modal.className = 'fin-cog-modal'; modal.id = 'fin-cog-modal';
    modal.innerHTML =
      '<div class="fin-cog-inner">'+
        '<div class="fin-cog-title">⚙ ACCOUNT SETTINGS</div>'+
        '<div class="fin-cog-row"><div class="fin-cog-label">Navy Federal Label</div><input id="fin-cog-nfcu" value="'+(names.nfcu||'Navy Federal')+'" /></div>'+
        '<div class="fin-cog-row"><div class="fin-cog-label">Wells Fargo Label</div><input id="fin-cog-wf" value="'+(names.wf||'Wells Fargo')+'" /></div>'+
        '<button class="fin-cog-save" onclick="FinanceModule._saveCog()">SAVE CHANGES</button>'+
        '<button class="fin-cog-close" onclick="FinanceModule._closeCog()">Cancel</button>'+
      '</div>';
    document.body.appendChild(modal);
  },
  _saveCog() {
    var data = this._load();
    if (!data.accountNames) data.accountNames = {};
    var n = document.getElementById('fin-cog-nfcu');
    var w = document.getElementById('fin-cog-wf');
    if (n && n.value.trim()) data.accountNames.nfcu = n.value.trim();
    if (w && w.value.trim()) data.accountNames.wf   = w.value.trim();
    this._save(data); this._closeCog(); Shell.toast('Settings saved'); this.init();
  },
  _closeCog() {
    var el = document.getElementById('fin-cog-modal');
    if (el) el.parentNode.removeChild(el);
    this._cogOpen = false;
  },

  /* ── Save Statement ── */
  _saveStatement() {
    var label    = (document.getElementById('fin-period-label') || {}).value || '';
    label = label.trim();
    if (!label) { Shell.toast('Enter a period label', true); return; }

    var calStart = ((document.getElementById('fin-cal-start') || {}).value || '').trim();
    var calEnd   = ((document.getElementById('fin-cal-end')   || {}).value || '').trim();
    var income   = parseFloat((document.getElementById('fin-income')       || {}).value) || 0;
    var totSpend = parseFloat((document.getElementById('fin-total-spend')  || {}).value) || 0;
    var dining   = parseFloat((document.getElementById('fin-dining-quick') || {}).value) || 0;
    var fees     = parseFloat((document.getElementById('fin-fees')         || {}).value) || 0;
    var startBal = parseFloat((document.getElementById('fin-start-bal')    || {}).value) || 0;
    var endBal   = parseFloat((document.getElementById('fin-end-bal')      || {}).value) || 0;
    var xferOut  = parseFloat((document.getElementById('fin-xfer-out')     || {}).value) || 0;
    var xferIn   = parseFloat((document.getElementById('fin-xfer-in')      || {}).value) || 0;

    var months = ['january','february','march','april','may','june','july','august','september','october','november','december'];
    var parts  = label.toLowerCase().split(' ');
    var mIdx   = months.indexOf(parts[0]);
    var yr     = parts[1] || '2026';
    var key    = mIdx >= 0 ? (yr + '-' + String(mIdx+1).padStart(2,'0') + '-CAL') : label.replace(/\s+/g,'-').toLowerCase();

    // Derive cal dates if not provided
    if (!calStart && mIdx >= 0) calStart = yr + '-' + String(mIdx+1).padStart(2,'0') + '-01';
    if (!calEnd   && mIdx >= 0) { var ld = new Date(parseInt(yr), mIdx+1, 0).getDate(); calEnd = yr + '-' + String(mIdx+1).padStart(2,'0') + '-' + String(ld).padStart(2,'0'); }
    var days = calStart && calEnd ? Math.round((new Date(calEnd)-new Date(calStart))/86400000)+1 : 30;

    var spending = {};
    var FM = this;
    this.CATS.forEach(function(c){ spending[c] = 0; });
    if (this._advancedOpen) {
      this.CATS.forEach(function(c) {
        var el = document.getElementById('fin-cat-'+c.replace(/[\s\/]/g,'_'));
        spending[c] = parseFloat((el||{}).value) || 0;
      });
    } else {
      spending['Dining'] = dining;
      spending['Other']  = Math.max(0, totSpend - dining - fees);
    }

    var data = this._load();
    if (!data.statements[key]) data.statements[key] = { nfcu: null, wf: null };
    data.statements[key][this._addAcct] = {
      income: income, startBal: startBal, endBal: endBal,
      transfersOut: xferOut, transfersIn: xferIn, fees: fees,
      spending: spending,
      meta: { period: label, cal_start: calStart, cal_end: calEnd, stmt_start: '', stmt_end: '', days: days }
    };
    this._save(data);
    this._activePeriod = key;
    this._advancedOpen = false;
    this._closePanel();
    Shell.toast('Statement saved');
    this.init();
  },

  stats() {
    var data = this._load();
    var keys = Object.keys(data.statements).sort();
    if (!keys.length) return null;
    var latest = data.statements[keys[keys.length-1]];
    var s = this._periodStats(latest);
    var ref = latest.nfcu || latest.wf;
    return Object.assign({}, s, { period: ref && ref.meta ? ref.meta.period : keys[keys.length-1] });
  },

  /* ══════════════════════════════════════════
     AI STATEMENT UPLOAD
  ══════════════════════════════════════════ */
  _uploadAcct: 'nfcu',
  _uploadParsed: null,

  },
