<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TruOS">
<title>TruOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   SHELL — Tokens & layout
═══════════════════════════════════════════ */
:root {
  --glass:        rgba(255,255,255,0.07);
  --glass-border: rgba(255,255,255,0.12);
  --glass-hi:     rgba(255,255,255,0.18);
  --bg:           #08090a;
  --amber:        #f5a623;
  --purple:       #9e61ff;
  --red:          #ff4757;
  --red-dim:      rgba(255,71,87,0.12);
  --green:        #2ed573;
  --blue:         #1e90ff;
  --text:         #ffffff;
  --muted:        rgba(255,255,255,0.45);
  --sans:         'Syne', sans-serif;
  --mono:         'Space Mono', monospace;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
  overflow-x: hidden;
  position: relative;
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  z-index: -1;
  background:
    radial-gradient(circle at 12% 18%, rgba(245,166,35,0.18) 0%, transparent 42%),
    radial-gradient(circle at 88% 82%, rgba(158,97,255,0.16) 0%, transparent 42%),
    radial-gradient(circle at 50% 50%, rgba(30,144,255,0.06) 0%, transparent 50%);
  filter: blur(70px);
  animation: meshShift 22s ease-in-out infinite alternate;
}
@keyframes meshShift {
  0%   { transform: scale(1) rotate(0deg); }
  100% { transform: scale(1.25) rotate(6deg); }
}

#main-content { min-height: 100dvh; padding-bottom: 90px; }

/* ── Shell Nav ── */
.shell-nav {
  position: fixed; bottom: 0;
  width: 100%; max-width: 480px;
  background: rgba(8,9,10,0.82);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-top: 1px solid var(--glass-border);
  display: grid; grid-template-columns: repeat(5,1fr);
  padding: 10px 0 max(16px, env(safe-area-inset-bottom));
  z-index: 900;
}
.nav-tab {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  cursor: pointer; opacity: 0.32; transition: opacity 0.2s;
}
.nav-tab.active { opacity: 1; }
.nav-tab svg { width: 18px; height: 18px; stroke: var(--muted); }
.nav-tab.active svg { stroke: var(--amber); }
.nav-label { font-family: var(--mono); font-size: 7px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
.nav-tab.active .nav-label { color: var(--amber); }

/* ── Shell Toast ── */
#shell-toast {
  position: fixed; top: 20px; left: 50%;
  transform: translateX(-50%) translateY(-120px);
  background: var(--text); color: #000;
  padding: 10px 24px; border-radius: 30px;
  font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 0.5px;
  transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
  z-index: 9999; white-space: nowrap; pointer-events: none;
}
#shell-toast.show { transform: translateX(-50%) translateY(0); }
#shell-toast.err  { background: var(--red); color: #fff; }

/* ═══════════════════════════════════════════
   SHARED — Used by all modules
═══════════════════════════════════════════ */
.mod-header {
  padding: 28px 20px 8px;
  display: flex; justify-content: space-between; align-items: flex-end;
}
.sys-label {
  font-family: var(--mono); font-size: 8px; letter-spacing: 4px;
  color: var(--muted); text-transform: uppercase; display: block;
}
.mod-title { font-size: 26px; font-weight: 800; letter-spacing: -1px; line-height: 1.05; }
.mod-title em { font-style: normal; color: var(--amber); }

.stats-bar {
  display: grid; grid-template-columns: repeat(3,1fr);
  gap: 10px; padding: 12px 20px;
}
.stat {
  background: var(--glass); backdrop-filter: blur(10px);
  border: 1px solid var(--glass-border); border-radius: 16px;
  padding: 12px 10px; text-align: center;
}
.stat-val { font-family: var(--mono); font-size: 21px; font-weight: 700; display: block; line-height: 1; }
.stat-sub { font-family: var(--mono); font-size: 8px; text-transform: uppercase; color: var(--muted); letter-spacing: 1px; margin-top: 4px; display: block; }

.pill-row { padding: 8px 20px; display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; }
.pill-row::-webkit-scrollbar { display: none; }

.pill {
  padding: 7px 16px; border-radius: 30px;
  background: var(--glass); border: 1px solid var(--glass-border);
  color: var(--text); font-family: var(--sans); font-size: 11px; font-weight: 600;
  white-space: nowrap; cursor: pointer; transition: 0.2s; backdrop-filter: blur(5px);
}
.pill.active  { background: var(--text); color: #000; border-color: var(--text); }
.pill.p-amber { background: var(--amber); color: #000; border-color: var(--amber); }

.list-area { padding: 4px 20px 20px; display: flex; flex-direction: column; gap: 10px; }
.section-head {
  font-family: var(--mono); font-size: 9px; color: var(--muted);
  letter-spacing: 2px; text-transform: uppercase;
  padding: 12px 4px 4px;
  display: flex; justify-content: space-between; align-items: center;
}
.card {
  background: var(--glass); backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border); border-radius: 18px;
  padding: 15px; display: flex; align-items: center; gap: 14px; transition: 0.2s;
}
.card:active { transform: scale(0.985); }
.card.overdue { border-color: rgba(255,71,87,0.45); background: rgba(255,71,87,0.06); }
.card.today   { border-color: rgba(245,166,35,0.4);  background: rgba(245,166,35,0.05); }
.card.done    { opacity: 0.32; filter: grayscale(0.7); }

.checkbox {
  width: 24px; height: 24px; border-radius: 50%; flex-shrink: 0;
  border: 1.5px solid var(--glass-border);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; cursor: pointer; transition: 0.15s;
}
.checkbox.checked { background: var(--green); border-color: var(--green); color: #000; }

.card-body { flex: 1; min-width: 0; }
.card-title { font-size: 14px; font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-bottom: 3px; }
.card-meta  { font-family: var(--mono); font-size: 10px; color: var(--muted); }
.btn-del    { background: transparent; border: none; color: var(--muted); padding: 5px; cursor: pointer; font-size: 14px; opacity: 0.4; transition: 0.2s; }
.btn-del:hover { opacity: 1; color: var(--red); }
.clear-btn  { background: transparent; border: 1px solid rgba(255,71,87,0.4); color: var(--red); font-size: 8px; font-family: var(--mono); padding: 2px 8px; border-radius: 4px; cursor: pointer; letter-spacing: 1px; }
.empty-state { text-align: center; padding: 50px 20px; color: var(--muted); font-family: var(--mono); font-size: 10px; letter-spacing: 2px; }

.slide-panel {
  position: fixed; bottom: 0; left: 50%;
  transform: translateX(-50%) translateY(100%);
  width: 100%; max-width: 480px;
  background: rgba(10,10,12,0.96); backdrop-filter: blur(30px);
  border-radius: 28px 28px 0 0;
  padding: 28px 20px max(48px,env(safe-area-inset-bottom));
  transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
  z-index: 800; border-top: 1px solid var(--glass-border);
}
.slide-panel.open { transform: translateX(-50%) translateY(0); }

input, select {
  width: 100%; background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: 12px; padding: 12px; color: var(--text); margin-bottom: 10px;
  font-family: var(--sans); font-size: 14px; outline: none; -webkit-appearance: none;
}
input:focus, select:focus { border-color: var(--amber); }
select option { background: #141416; }

.fab {
  position: fixed; bottom: 82px; right: 20px;
  width: 54px; height: 54px; border-radius: 50%;
  background: var(--text); border: none; color: #000;
  font-size: 26px; box-shadow: 0 8px 28px rgba(0,0,0,0.4);
  z-index: 850; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: 0.3s;
}
.fab.open { transform: rotate(45deg); background: var(--red-dim); color: var(--red); border: 1px solid var(--red); box-shadow: none; }


/* ═══════════════════════════════════════════
   ACADEMIC v2 — Mental Clarity styles
═══════════════════════════════════════════ */
.week-header {
  padding: 18px 4px 6px;
  display: flex; flex-direction: column; gap: 6px;
}
.week-label {
  font-family: var(--mono); font-size: 10px; font-weight: 700;
  color: var(--text); letter-spacing: 2px; text-transform: uppercase;
  display: flex; justify-content: space-between; align-items: center;
}
.week-progress-row {
  display: flex; align-items: center; gap: 8px;
}
.week-bar-track {
  flex: 1; height: 4px; background: rgba(255,255,255,0.08);
  border-radius: 4px; overflow: hidden;
}
.week-bar-fill {
  height: 100%; border-radius: 4px;
  background: linear-gradient(90deg, var(--green), var(--amber));
  transition: width 0.4s cubic-bezier(0.16,1,0.3,1);
}
.week-bar-label {
  font-family: var(--mono); font-size: 9px; color: var(--muted);
  white-space: nowrap;
}
.card.soon { border-color: rgba(245,166,35,0.45); background: rgba(245,166,35,0.06); }

.completed-toggle {
  font-family: var(--mono); font-size: 10px; color: var(--muted);
  letter-spacing: 1px; padding: 14px 4px 6px;
  cursor: pointer; display: flex; align-items: center; gap: 6px;
  user-select: none; -webkit-user-select: none;
}
.completed-toggle:active { opacity: 0.6; }
.completed-caret { font-size: 8px; transition: transform 0.2s; }
.completed-caret.open { transform: rotate(90deg); }
.completed-list { display: flex; flex-direction: column; gap: 10px; }
.purge-row { padding: 8px 4px 4px; display: flex; justify-content: flex-end; }

/* ═══════════════════════════════════════════
   FINANCE MODULE — v2.0 DUAL-ACCOUNT FORENSIC
═══════════════════════════════════════════ */
.fin-wrap { padding: 0 18px 100px; }

/* Period / Account selectors */
.fin-period-row {
  display: flex; gap: 8px; align-items: center;
  margin-bottom: 10px; overflow-x: auto; scrollbar-width: none;
}
.fin-period-row::-webkit-scrollbar { display: none; }

/* Phase 1 — Account balance strips */
.fin-acct-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
.fin-acct-card {
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: 18px; padding: 14px 16px;
}
.fin-acct-header {
  display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
}
.fin-acct-name {
  font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: 1px;
}
.fin-acct-edit {
  font-family: var(--mono); font-size: 9px; color: var(--muted);
  background: transparent; border: 1px solid var(--glass-border);
  border-radius: 6px; padding: 2px 8px; cursor: pointer;
}
.fin-acct-row {
  display: grid; grid-template-columns: repeat(4,1fr); gap: 6px;
}
.fin-acct-stat { text-align: center; }
.fin-acct-val {
  font-family: var(--mono); font-size: 13px; font-weight: 700;
  display: block; line-height: 1.2;
}
.fin-acct-sub {
  font-family: var(--mono); font-size: 7px; text-transform: uppercase;
  color: var(--muted); letter-spacing: 0.5px; margin-top: 2px;
}
.fin-netting-pill {
  display: flex; align-items: center; gap: 8px;
  background: rgba(30,144,255,0.08); border: 1px solid rgba(30,144,255,0.25);
  border-radius: 10px; padding: 8px 12px; margin-bottom: 14px;
  font-family: var(--mono); font-size: 9px; color: rgba(30,144,255,0.9);
}

/* Phase 2 — Unified category table */
.fin-cats { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
.fin-cat-row { display: flex; flex-direction: column; gap: 4px; }
.fin-cat-top { display: flex; align-items: center; gap: 10px; }
.fin-cat-name {
  font-family: var(--mono); font-size: 9px; text-transform: uppercase;
  letter-spacing: 1px; color: var(--muted); width: 90px; flex-shrink: 0;
}
.fin-cat-dual-bar { flex: 1; display: flex; flex-direction: column; gap: 3px; }
.fin-cat-bar-track {
  height: 5px; background: var(--glass);
  border-radius: 4px; overflow: hidden; border: 1px solid var(--glass-border);
}
.fin-cat-bar-fill { height: 100%; border-radius: 4px; transition: width 0.6s cubic-bezier(0.16,1,0.3,1); }
.fin-cat-amt {
  font-family: var(--mono); font-size: 10px; font-weight: 700;
  width: 54px; text-align: right; flex-shrink: 0;
}

/* Phase 3 — Audit flags */
.fin-phase-head {
  font-family: var(--mono); font-size: 8px; letter-spacing: 3px;
  text-transform: uppercase; color: var(--muted); padding: 14px 0 8px;
  display: flex; justify-content: space-between; align-items: center;
}
.fin-phase-head span { color: var(--amber); }
.fin-flags { display: flex; flex-direction: column; gap: 8px; margin-bottom: 6px; }
.fin-flag {
  border-radius: 12px; padding: 11px 14px;
  font-family: var(--mono); font-size: 10px; letter-spacing: 0.5px;
  display: flex; align-items: flex-start; gap: 10px;
}
.fin-flag.flag-red    { background: rgba(255,71,87,0.10);  border: 1px solid rgba(255,71,87,0.3); }
.fin-flag.flag-amber  { background: rgba(245,166,35,0.10); border: 1px solid rgba(245,166,35,0.3); }
.fin-flag.flag-blue   { background: rgba(30,144,255,0.10); border: 1px solid rgba(30,144,255,0.3); }
.fin-flag.flag-green  { background: rgba(46,213,115,0.10); border: 1px solid rgba(46,213,115,0.3); }
.fin-flag-icon { font-size: 14px; flex-shrink: 0; line-height: 1.3; }
.fin-flag-body { flex: 1; min-width: 0; }
.fin-flag-title { font-weight: 700; margin-bottom: 2px; }
.fin-flag-detail { color: var(--muted); font-size: 9px; line-height: 1.5; }
.fin-flag-dismiss {
  background: transparent; border: none; color: var(--muted);
  font-size: 14px; cursor: pointer; padding: 0 0 0 4px; flex-shrink: 0;
  opacity: 0.5; transition: 0.2s;
}
.fin-flag-dismiss:active { opacity: 1; color: var(--red); }

/* Phase 4 — Sticky summary bar */
.fin-p4-sticky {
  position: fixed; bottom: 72px; left: 50%;
  transform: translateX(-50%);
  width: calc(100% - 32px); max-width: 448px;
  background: rgba(8,9,10,0.94); backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border: 1px solid var(--glass-border); border-radius: 20px;
  padding: 12px 16px; z-index: 700;
  display: grid; grid-template-columns: repeat(3,1fr); gap: 8px;
}
.fin-p4-metric { text-align: center; }
.fin-p4-val {
  font-family: var(--mono); font-size: 16px; font-weight: 700;
  display: block; line-height: 1.1;
}
.fin-p4-sub {
  font-family: var(--mono); font-size: 7px; text-transform: uppercase;
  color: var(--muted); letter-spacing: 0.5px; margin-top: 3px;
}

/* 3-month compare */
.fin-compare-bars { display: flex; align-items: flex-end; gap: 10px; height: 72px; margin: 8px 0 14px; }
.fin-cbar-wrap { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 3px; height: 100%; justify-content: flex-end; }
.fin-cbar { width: 100%; border-radius: 5px 5px 0 0; min-height: 4px; }
.fin-cbar-label { font-family: var(--mono); font-size: 8px; color: var(--muted); }
.fin-cbar-amt   { font-family: var(--mono); font-size: 9px; font-weight: 700; }

/* Add panel */
.fin-panel-title {
  font-family: var(--mono); font-size: 10px; letter-spacing: 2px;
  text-transform: uppercase; margin-bottom: 16px; color: var(--muted);
}
.fin-panel-title span { color: var(--amber); }
.fin-section-head {
  font-family: var(--mono); font-size: 8px; letter-spacing: 2px;
  text-transform: uppercase; color: var(--muted); margin: 12px 0 6px;
}
.fin-cat-inputs { display: flex; flex-direction: column; gap: 6px; }
.fin-cat-input-row { display: flex; align-items: center; gap: 8px; }
.fin-cat-input-label {
  font-family: var(--mono); font-size: 9px; text-transform: uppercase;
  width: 100px; flex-shrink: 0; color: var(--muted);
}
.fin-cat-input-row input { margin-bottom: 0; flex: 1; }
.fin-save-btn {
  width: 100%; padding: 14px; background: var(--amber); color: #000;
  border: none; border-radius: 14px; font-family: var(--mono); font-weight: 700;
  font-size: 12px; letter-spacing: 2px; cursor: pointer; margin-top: 14px;
}
.fin-acct-select {
  display: flex; gap: 8px; margin-bottom: 10px;
}
.fin-acct-opt {
  flex: 1; padding: 10px; border-radius: 12px; text-align: center;
  background: var(--glass); border: 1px solid var(--glass-border);
  font-family: var(--mono); font-size: 10px; cursor: pointer; transition: 0.2s;
}
.fin-acct-opt.selected { border-color: var(--amber); color: var(--amber); }

/* ═══════════════════════════════════════════
   INCOME MODULE — v3.4 FLUID styles
═══════════════════════════════════════════ */
.inc-wrap { padding: 0 18px 24px; }

/* Progress card */
.progress-card {
  background: var(--glass); backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border); border-radius: 20px;
  padding: 18px; margin-bottom: 16px;
}
.pc-top { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 12px; }
.pc-net { font-family: var(--mono); font-size: 32px; font-weight: 700; color: var(--green); line-height: 1; }
.pc-net sup { font-size: 14px; vertical-align: super; }
.pc-target { text-align: right; }
.pc-target-val { font-family: var(--mono); font-size: 22px; font-weight: 700; color: var(--muted); }
.v-bar { height: 6px; background: rgba(255,255,255,0.08); border-radius: 6px; overflow: hidden; margin-bottom: 8px; }
.v-fill { height: 100%; border-radius: 6px; background: linear-gradient(90deg, var(--green), var(--amber)); transition: width 0.5s cubic-bezier(0.16,1,0.3,1); }
.v-meta { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 9px; color: var(--muted); }

/* Week tabs */
.week-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
.week-tab {
  flex: 1; padding: 11px; border-radius: 12px;
  background: var(--glass); border: 1px solid var(--glass-border);
  color: var(--muted); cursor: pointer; font-family: var(--mono);
  font-size: 10px; text-align: center; font-weight: 600; transition: 0.2s;
}
.week-tab.active { background: var(--green); color: #000; border-color: var(--green); font-weight: 700; }

/* Day rows */
.day-row {
  display: grid; grid-template-columns: 72px 1fr auto;
  align-items: center; gap: 10px;
  background: var(--glass); border: 1px solid var(--glass-border);
  border-radius: 14px; padding: 12px 14px; margin-bottom: 8px;
  backdrop-filter: blur(8px);
}
.day-name { font-size: 11px; font-weight: 700; color: var(--muted); font-family: var(--mono); letter-spacing: 1px; }
.day-name.on { color: var(--text); }

.tag-row { display: flex; gap: 4px; margin-top: 5px; flex-wrap: wrap; }
.tag { font-size: 8px; font-family: var(--mono); padding: 2px 6px; border-radius: 4px; font-weight: 700; text-transform: uppercase; }
.tag-base   { background: rgba(46,213,115,0.12); color: var(--green); }
.tag-pickup { background: rgba(245,166,35,0.12);  color: var(--amber); }
.tag-wknd   { background: rgba(30,144,255,0.12);  color: var(--blue); }
.tag-ot     { background: rgba(255,71,87,0.12);   color: var(--red); border: 1px solid rgba(255,71,87,0.25); }

.chip-row { display: flex; gap: 4px; margin-bottom: 4px; }
.chip {
  padding: 5px 9px; border-radius: 6px;
  border: 1px solid var(--glass-border); background: rgba(255,255,255,0.04);
  color: var(--muted); font-family: var(--mono); font-size: 10px;
  cursor: pointer; transition: 0.15s; font-weight: 600;
}
.chip.active { border-color: var(--green); color: var(--green); background: rgba(46,213,115,0.08); }
.chip.active-w { border-color: var(--amber); color: var(--amber); background: rgba(245,166,35,0.08); }
.chip-remove { color: var(--red); border: none; background: transparent; cursor: pointer; font-size: 16px; padding: 2px 8px; line-height: 1; }

.day-earn { font-family: var(--mono); font-size: 14px; font-weight: 700; color: var(--muted); text-align: right; white-space: nowrap; }
.day-earn.on { color: var(--green); }

/* Clear row */
.inc-clear-row { display: flex; justify-content: flex-end; margin-bottom: 4px; }

/* ═══════════════════════════════════════════
   DASHBOARD MODULE
═══════════════════════════════════════════ */
.dash-wrap { padding: 0 20px 24px; display: flex; flex-direction: column; gap: 14px; }
.dash-status {
  background: var(--glass); backdrop-filter: blur(12px);
  border: 1px solid var(--glass-border); border-radius: 20px;
  padding: 18px 20px; display: flex; flex-direction: column; gap: 4px;
}
.dash-status-line {

<body>

<div id="shell-toast"></div>
<div id="main-content"></div>

<nav class="shell-nav" id="shell-nav">

<script>
'use strict';

/* ═══════════════════════════════════════════
   SHELL
═══════════════════════════════════════════ */
const Shell = {
  _active: null,
  _clockInterval: null,
  modules: {},

  init() {
    document.getElementById('shell-nav').addEventListener('click', e => {
      const tab = e.target.closest('[data-mod]');
      if (tab) this.switchTo(tab.dataset.mod);
    });
    this.switchTo('dashboard');
  },

  switchTo(name) {
    const mod = this.modules[name];
    if (!mod) return;
    if (this._active?.teardown) this._active.teardown();
    if (this._clockInterval) { clearInterval(this._clockInterval); this._clockInterval = null; }
    document.querySelectorAll('.nav-tab').forEach(t => t.classList.toggle('active', t.dataset.mod === name));
    document.querySelectorAll('.slide-panel, .fab').forEach(el => el.remove());
    this._active = mod;
    mod.init();
    if (mod.updateClock) {
      mod.updateClock();
      this._clockInterval = setInterval(() => mod.updateClock(), 1000);
    }
  },

  exportState() {
    // Collect all localStorage keys used by TruOS
    const state = {
      'truos-academic':    localStorage.getItem('truos-academic')    || '[]',
      'truos-ac-filter':   localStorage.getItem('truos-ac-filter')   || 'all',
      'truos_schedule_v34': localStorage.getItem('truos_schedule_v34') || 'null',
    };

    // Read current HTML
    const html = document.documentElement.outerHTML;

    // Inject a bootstrap script just before </body> that restores state on load
    const bootstrap = `
<script id="truos-state-bootstrap">
(function(){
  const state = ${JSON.stringify(state)};
  Object.entries(state).forEach(([k,v]) => { if(v && v !== 'null') localStorage.setItem(k,v); });
  document.getElementById('truos-state-bootstrap').remove();
})();
<\/script>`;

    const parts = html.split('<\/body>');
    const exported = parts[0] + bootstrap + '\n<\/body>' + (parts[1] || '');

    // Download
    const blob = new Blob([exported], { type: 'text/html' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    a.href     = url;
    a.download = 'TruOS-Unified.html';
    a.click();
    URL.revokeObjectURL(url);
    Shell.toast('STATE EXPORTED — OPEN ON ANY DEVICE');
  },

  toast(msg, isErr = false) {
    const t = document.getElementById('shell-toast');
    t.textContent = msg;
    t.className = 'show' + (isErr ? ' err' : '');
    clearTimeout(t._timer);
    t._timer = setTimeout(() => t.className = '', 2400);
  }
};

/* ── Shared utils ── */
function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function mount(html) { document.getElementById('main-content').innerHTML = html; }
function nowClock() {
  return {
    time: new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' }),
    date: new Date().toLocaleDateString([], { weekday:'short', month:'short', day:'numeric' }).toUpperCase()
  };
}

/* ═══════════════════════════════════════════
   MODULE 01 — INCOME OPTIMIZER
   Faithful port of TruOS v3.4 FLUID
   All calculation logic preserved exactly.
═══════════════════════════════════════════ */
const IncomeModule = {

  /* ── Exact CONFIG from v3.4 ── */
  CFG: {
    baseRate:    17.31,
    diffs:       { afternoon: 2.50, midnight: 2.75, weekend: 2.00 },
    tax:         0.192,
    otThreshold: 40,
    target:      2000
  },

  DAYS: ["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],

  state: {
    weeks:      null,  // hydrated in init()
    activeWeek: 0
  },

  /* ── Core math — exact port from v3.4 ── */
  calculateShiftGross(isWeekend, cumHrsBefore, duration) {
    const { baseRate, diffs, otThreshold } = this.CFG;
    const wknd = isWeekend ? diffs.weekend : 0;
    const blockAHrs = Math.min(duration, 4.5);
    const blockBHrs = Math.max(0, duration - blockAHrs);

    const blocks = [
      { hrs: blockAHrs, rate: baseRate + diffs.afternoon + wknd },
      { hrs: blockBHrs, rate: baseRate + diffs.midnight  + wknd }
    ];

    let shiftTotal = 0;
    let runningCumHrs = cumHrsBefore;

    blocks.forEach(block => {
      if (block.hrs <= 0) return;
      const regInBlock = Math.min(block.hrs, Math.max(0, otThreshold - runningCumHrs));
      const otInBlock  = block.hrs - regInBlock;
      shiftTotal      += (regInBlock * block.rate) + (otInBlock * block.rate * 1.5);
      runningCumHrs   += block.hrs;
    });
    return shiftTotal;
  },

  toNet(gross) { return gross * (1 - this.CFG.tax); },

  emptyWeeks() {
    return [0,1].map(() =>
      this.DAYS.reduce((acc, d) => ({ ...acc, [d]: { type: 'off', hrs: 12 } }), {})
    );
  },

  /* ── Replaces React's useMemo weekCalcs ── */
  calcWeek(week) {
    let totalGross = 0, cumHrs = 0;
    const days = {};
    this.DAYS.forEach(day => {
      const s = week[day];
      if (s.type === 'off') { days[day] = { ...s, gross: 0, net: 0, otHrs: 0 }; return; }
      const gross   = this.calculateShiftGross(s.type === 'wknd', cumHrs, s.hrs);
      const otTotal = Math.max(0, (cumHrs + s.hrs) - this.CFG.otThreshold);
      const shiftOT = Math.min(s.hrs, otTotal);
      days[day]     = { ...s, gross, net: this.toNet(gross), otHrs: shiftOT };
      totalGross   += gross;
      cumHrs       += s.hrs;
    });
    return { days, totalGross, totalNet: this.toNet(totalGross), totalHrs: cumHrs };
  },

  getCombined(weekCalcs) {
    const gross = weekCalcs[0].totalGross + weekCalcs[1].totalGross;
    return { gross, net: this.toNet(gross), hrs: weekCalcs[0].totalHrs + weekCalcs[1].totalHrs };
  },

  fmt(n) { return n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); },

  /* ── Storage ── */
  init() {
    // Hydrate fresh each mount — no stale IIFE state
    try {
      const raw = localStorage.getItem('truos_schedule_v34');
      this.state.weeks = raw ? JSON.parse(raw) : this.emptyWeeks();
      // Validate shape
      if (!Array.isArray(this.state.weeks) || this.state.weeks.length !== 2) {
        this.state.weeks = this.emptyWeeks();
      }
    } catch {
      this.state.weeks = this.emptyWeeks();
      localStorage.removeItem('truos_schedule_v34');
    }
    this.state.activeWeek = 0;
    this.render();
    this.bindEvents();
  },

  save() {
    try { localStorage.setItem('truos_schedule_v34', JSON.stringify(this.state.weeks)); } catch(e) {}
  },

  updateDay(wi, day, type, hrs) {
    this.state.weeks[wi] = { ...this.state.weeks[wi], [day]: { type, hrs } };
    this.save();
    this.render();
    this.bindEvents();
  },

  updateClock() {
    const c = nowClock();
    const te = document.getElementById('inc-time');
    const de = document.getElementById('inc-date');
    if (te) te.textContent = c.time;
    if (de) de.textContent = c.date;
  },

  /* ── Render ── */
  render() {
    const weekCalcs  = this.state.weeks.map(w => this.calcWeek(w));
    const combined   = this.getCombined(weekCalcs);
    const remaining  = Math.max(0, this.CFG.target - combined.net);
    const pct        = Math.min(100, (combined.net / this.CFG.target) * 100);
    const aw         = this.state.activeWeek;
    const wc         = weekCalcs[aw];

    /* Week tabs */
    const tabsHTML = [0,1].map(wi => `
      <div class="week-tab${aw === wi ? ' active' : ''}" data-action="week-tab" data-wi="${wi}">
        WEEK ${wi+1} · ${weekCalcs[wi].totalHrs}H
      </div>`).join('');

    /* Day rows */
    const daysHTML = this.DAYS.map(day => {
      const s   = wc.days[day];
      const isOn = s.type !== 'off';
      const tagType = s.type === 'wknd' ? 'wknd' : s.type === 'base' ? 'base' : 'pickup';

      const typeChips = ['base','pickup','wknd'].map(t => {
        const active = s.type === t;
        const cls = active ? (t === 'wknd' ? 'chip active-w' : 'chip active') : 'chip';
        return `<button class="${cls}" data-action="set-type" data-day="${day}" data-type="${t}" data-hrs="${s.hrs}">${t[0].toUpperCase()}</button>`;
      }).join('');

      const hrsChips = isOn ? [8,12].map(h =>
        `<button class="chip${s.hrs===h?' active':''}" data-action="set-hrs" data-day="${day}" data-type="${s.type}" data-hrs="${h}">${h}H</button>`
      ).join('') : '';

      const removeBtn = isOn
        ? `<button class="chip-remove" data-action="remove-day" data-day="${day}">✕</button>`
        : '';

      return `
        <div class="day-row">
          <div>
            <div class="day-name${isOn ? ' on' : ''}">${day.substring(0,3).toUpperCase()}</div>
            ${isOn ? `<div class="tag-row">
              <span class="tag tag-${tagType}">${s.hrs}H ${s.type}</span>
              ${s.otHrs > 0 ? `<span class="tag tag-ot">${s.otHrs}H OT</span>` : ''}
            </div>` : ''}
          </div>
          <div>
            <div class="chip-row">${typeChips}${removeBtn}</div>
            ${isOn ? `<div class="chip-row">${hrsChips}</div>` : ''}
          </div>
          <div class="day-earn${isOn ? ' on' : ''}">
            ${isOn ? `$${Math.round(s.net)}` : '—'}
          </div>
        </div>`;
    }).join('');

    const gapColor = remaining > 0 ? 'var(--red)' : 'var(--green)';
    const gapText  = remaining > 0 ? `GAP: -$${this.fmt(remaining)}` : '✓ GOAL REACHED';

    mount(`
      <header class="mod-header">
        <div>
          <span class="sys-label">TruOS · Module 01</span>
          <h1 class="mod-title">Income<br><em>Optimizer</em></h1>
        </div>
        <div style="text-align:right">
          <div class="sys-label" id="inc-date"></div>
          <div style="font-family:var(--mono);font-size:18px;font-weight:700;" id="inc-time"></div>
        </div>
      </header>

      <div class="inc-wrap">

        <!-- Progress card -->
        <div class="progress-card">
          <div class="pc-top">
            <div>
              <div class="sys-label" style="margin-bottom:5px">Biweekly Net</div>
              <div class="pc-net"><sup>$</sup>${this.fmt(combined.net)}</div>
            </div>
            <div class="pc-target">
              <div class="pc-target-val">$${this.CFG.target}</div>
              <div class="sys-label" style="margin-top:2px">target</div>
            </div>
          </div>
          <div class="v-bar"><div class="v-fill" style="width:${pct}%"></div></div>
          <div class="v-meta">
            <span>${pct.toFixed(1)}% complete · ${combined.hrs}H scheduled</span>
            <span style="color:${gapColor}">${gapText}</span>
          </div>
        </div>

        <!-- Stats -->
        <div class="stats-bar" style="padding:0 0 16px">
          <div class="stat">
            <span class="stat-val" style="color:var(--green)">$${Math.round(combined.net)}</span>
            <span class="stat-sub">Net Pay</span>
          </div>
          <div class="stat">
            <span class="stat-val" style="color:var(--amber)">$${Math.round(combined.gross)}</span>
            <span class="stat-sub">Gross</span>
          </div>
          <div class="stat">
            <span class="stat-val" style="color:var(--muted)">${combined.hrs}H</span>
            <span class="stat-sub">Hours</span>
          </div>
        </div>

        <!-- Week tabs + clear -->
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
          <div class="sys-label">Schedule Builder</div>
          <button class="clear-btn" data-action="clear-all">CLEAR</button>
        </div>
        <div class="week-tabs">${tabsHTML}</div>

        <!-- Day rows -->
        <div id="days-grid">${daysHTML}</div>

      </div>
    `);

    this.updateClock();
  },

  bindEvents() {
    const wrap = document.getElementById('main-content');
    if (!wrap || wrap._incBound) return;
    wrap._incBound = true;

    wrap.addEventListener('click', e => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const { action, wi, day, type, hrs } = btn.dataset;
      const aw = this.state.activeWeek;

      if (action === 'week-tab') {
        this.state.activeWeek = +wi;
        this.render(); this.bindEvents(); return;
      }
      if (action === 'clear-all') {
        if (confirm('Clear both weeks?')) {
          this.state.weeks = this.emptyWeeks();
          this.save(); this.render(); this.bindEvents();
        }
        return;
      }
      if (action === 'set-type') {
        this.updateDay(aw, day, type, +hrs); return;
      }
      if (action === 'set-hrs') {
        this.updateDay(aw, day, type, +hrs); return;
      }
      if (action === 'remove-day') {
        this.updateDay(aw, day, 'off', 12); return;
      }
    });
  },

  teardown() {
    const wrap = document.getElementById('main-content');
    if (wrap) wrap._incBound = false;
  }
};

/* ═══════════════════════════════════════════
   MODULE 02 — ACADEMIC TRACKER (Canvas Optimized)
═══════════════════════════════════════════ */
const AcademicModule = {
  CFG: { class1: "MAT 151 (Math)", class2: "PSY 101 (Psych)" },
  state: { assignments: [], filter: 'all' },

  init() {
    try {
      const raw = localStorage.getItem('truos-academic');
      this.state.assignments = raw ? JSON.parse(raw) : [];
    } catch { 
      this.state.assignments = []; 
    }
    this.state.filter = localStorage.getItem('truos-ac-filter') || 'all';
    this.render();
    this.bindEvents();
  },

  importICS(text) {
    const events = [];
    const blocks = text.split('BEGIN:VEVENT');
    blocks.shift();

    blocks.forEach(block => {
      const titleMatch = block.match(/SUMMARY:(.*(?:\r?\n\s.*)*)/);
      let fullTitle = titleMatch ? titleMatch[1].replace(/\r?\n\s/g, '').trim() : "Untitled";
      let displayTitle = fullTitle.split('[')[0].trim();

      const dateMatch = block.match(/DTSTART[:;].*?(\d{8})/);
      let dueStr = "";
      if (dateMatch) {
        const d = dateMatch[1];
        dueStr = `${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}T23:59:00`;
      }

      const cls = fullTitle.includes("MAT 151") ? "c1" : "c2";

      if (dueStr && !fullTitle.includes("OFFICE HOURS")) {
        events.push({
          id: 'ac-' + Math.random().toString(36).substr(2, 9),
          title: displayTitle,
          due: dueStr,
          cls: cls,
          done: false
        });
      }
    });

    const existing = JSON.parse(localStorage.getItem('truos-academic') || '[]');
    const combined = [...existing, ...events].reduce((acc, current) => {
      const isDup = acc.find(item => item.title === current.title && item.due === current.due && item.cls === current.cls);
      if (!isDup) acc.push(current);
      return acc;
    }, []);

    this.state.assignments = combined;
    this.save();
    Shell.toast(`SYNCED: ${events.length} CANVAS TASKS`);
  },

  save() {
    localStorage.setItem('truos-academic', JSON.stringify(this.state.assignments));
    localStorage.setItem('truos-ac-filter', this.state.filter);
    this.render();
    this.bindEvents();
  },

  urgency(due, done) {
    if (done) return 'done';
    const hours = (new Date(due) - new Date()) / 36e5;
    if (hours < 0) return 'overdue';
    if (hours < 24) return 'today';
    if (hours < 72) return 'soon';
    return 'upcoming';
  },

  // Returns week number (1-based) relative to the earliest due date in dataset
  _weekNum(dueDate, minDate) {
    return Math.floor((new Date(dueDate) - minDate) / (7 * 24 * 36e5)) + 1;
  },

  // Build a single card HTML string
  _card(a) {
    const u  = this.urgency(a.due, a.done);
    const dt = new Date(a.due).toLocaleDateString([], {month:'short', day:'numeric'});
    return `
      <div class="card ${a.done ? 'done' : u}">
        <div class="checkbox ${a.done ? 'checked' : ''}" onclick="AcademicModule.toggle('${a.id}')">${a.done ? '✓' : ''}</div>
        <div class="card-body">
          <div class="card-title">${esc(a.title)}</div>
          <div class="card-meta">${a.cls === 'c1' ? 'MAT 151' : 'PSY 101'} · Due ${dt}</div>
        </div>
        <button class="btn-del" onclick="AcademicModule.remove('${a.id}')">✕</button>
      </div>`;
  },

  render() {
    const all = this.state.assignments;

    // Determine anchor date (earliest due in full dataset, ignoring filter)
    const dates = all.map(a => new Date(a.due)).filter(d => !isNaN(d));
    const minDate = dates.length ? new Date(Math.min(...dates)) : new Date();

    // Apply class filter for display
    const visible = all.filter(a => {
      if (this.state.filter === 'c1') return a.cls === 'c1';
      if (this.state.filter === 'c2') return a.cls === 'c2';
      return true;
    });

    // Split pending vs done
    const pending = visible.filter(a => !a.done).sort((a,b) => new Date(a.due) - new Date(b.due));
    const done    = visible.filter(a => a.done).sort((a,b) => new Date(a.due) - new Date(b.due));

    // Group pending by week number
    const weekMap = new Map();
    pending.forEach(a => {
      const wk = this._weekNum(a.due, minDate);
      if (!weekMap.has(wk)) weekMap.set(wk, []);
      weekMap.get(wk).push(a);
    });

    // Build week progress denominator from ALL (not just filtered) per week
    const weekTotals = new Map();
    all.forEach(a => {
      const wk = this._weekNum(a.due, minDate);
      if (!weekTotals.has(wk)) weekTotals.set(wk, { total: 0, done: 0 });
      weekTotals.get(wk).total++;
      if (a.done) weekTotals.get(wk).done++;
    });

    // Header
    let html = `
      <header class="mod-header">
        <div>
          <span class="sys-label">TruOS · Module 02</span>
          <h1 class="mod-title">Academic<br><em>Tracker</em></h1>
        </div>
      </header>
      <div class="pill-row">
        <button class="pill ${this.state.filter==='all'?'active':''}" onclick="AcademicModule.setFilter('all')">ALL</button>
        <button class="pill ${this.state.filter==='c1'?'active':''}" onclick="AcademicModule.setFilter('c1')">MATH</button>
        <button class="pill ${this.state.filter==='c2'?'active':''}" onclick="AcademicModule.setFilter('c2')">PSYCH</button>
        <button class="pill p-amber" onclick="document.getElementById('ics-input').click()">+ IMPORT ICS</button>
        <input type="file" id="ics-input" hidden onchange="AcademicModule.handleFile(this)">
      </div>
      <div class="list-area">`;

    if (pending.length === 0 && done.length === 0) {
      html += `<div class="empty-state">NO ASSIGNMENTS FOUND</div>`;
    }

    // Render week groups
    const sortedWeeks = [...weekMap.keys()].sort((a,b) => a - b);
    sortedWeeks.forEach(wk => {
      const items  = weekMap.get(wk);
      const totals = weekTotals.get(wk) || { total: items.length, done: 0 };
      const pct    = totals.total > 0 ? Math.round((totals.done / totals.total) * 100) : 0;
      const barW   = Math.min(100, pct);
      const barColor = pct === 100 ? 'background:var(--green)' : '';

      html += `
        <div class="week-header">
          <div class="week-label">
            <span>Week ${wk}</span>
            <span style="color:var(--muted);font-size:9px">${totals.done}/${totals.total} done</span>
          </div>
          <div class="week-progress-row">
            <div class="week-bar-track">
              <div class="week-bar-fill" style="width:${barW}%;${barColor}"></div>
            </div>
            <span class="week-bar-label">${pct}%</span>
          </div>
        </div>`;

      items.forEach(a => { html += this._card(a); });
    });

    // Completed section
    if (done.length > 0) {
      const isOpen = this.state.completedOpen || false;
      html += `
        <div class="completed-toggle" onclick="AcademicModule.toggleCompleted()">
          <span class="completed-caret ${isOpen ? 'open' : ''}">▶</span>
          COMPLETED (${done.length})
          <button class="clear-btn" style="margin-left:auto" onclick="event.stopPropagation();AcademicModule.purgeCompleted()">PURGE</button>
        </div>`;
      if (isOpen) {
        html += `<div class="completed-list">`;
        done.forEach(a => { html += this._card(a); });
        html += `</div>`;
      }
    }

    html += `</div>`;
    mount(html);
  },

  toggleCompleted() {
    this.state.completedOpen = !this.state.completedOpen;
    this.render();
  },

  purgeCompleted() {
    if (!confirm('Remove all completed assignments?')) return;
    this.state.assignments = this.state.assignments.filter(a => !a.done);
    this.state.completedOpen = false;
    this.save();
    Shell.toast('COMPLETED TASKS PURGED');
  },

  setFilter(f) { this.state.filter = f; localStorage.setItem('truos-ac-filter', f); this.render(); },
  toggle(id) {
    const a = this.state.assignments.find(x => x.id === id);
    if (a) a.done = !a.done;
    this.save();
  },
  remove(id) {
    this.state.assignments = this.state.assignments.filter(x => x.id !== id);
    this.save();
  },
  handleFile(input) {
    const reader = new FileReader();
    reader.onload = (e) => this.importICS(e.target.result);
    reader.readAsText(input.files[0]);
  },
  bindEvents() {},
  updateClock() {},
  teardown() { document.querySelectorAll('#ac-panel, #ac-fab').forEach(el => el.remove()); }
};

/* ═══════════════════════════════════════════
   MODULE 05 — FINANCE AUDIT v2.0
   Dual-Account Forensic Engine
═══════════════════════════════════════════ */
const FinanceModule = {

  STORAGE_KEY: 'truos-finance',
  SCHEMA_VER: 2,

  CATS: ['Dining','Groceries','Transport','Medical','Subscriptions','Personal Care','Entertainment','P2P / Cash','Other'],
  CAT_COLORS: {
    'Dining':'#ff6b81','Groceries':'#2ed573','Transport':'#1e90ff',
    'Medical':'#a29bfe','Subscriptions':'#fd79a8','Personal Care':'#fdcb6e',
    'Entertainment':'#e17055','P2P / Cash':'#636e72','Other':'#b2bec3'
  },
  ACCOUNTS: {
    nfcu:   { name: 'Navy Federal', color: '#f5a623' },
    acct_b: { name: 'Secondary Acct', color: '#9e61ff' }
  },

  _load() {
    try {
      const raw = localStorage.getItem(this.STORAGE_KEY);
      if (!raw) return this._seed();
      const parsed = JSON.parse(raw);
      return parsed.schemaVer === 2 ? parsed : this._migrateV1(parsed);
    } catch { return this._seed(); }
  },
  _save(data) { localStorage.setItem(this.STORAGE_KEY, JSON.stringify(data)); },

  _migrateV1(v1) {
    const v2 = { schemaVer: 2, accountNames: { nfcu: 'Navy Federal', acct_b: 'Secondary Acct' }, statements: {} };
    Object.keys(v1).forEach(function(k) {
      var s = v1[k];
      if (s && s.schemaVer !== 2) {
        v2.statements[k] = {
          nfcu: { income: s.income || 0, spending: s.spending || {}, transfersOut: 0, transfersIn: 0, fees: 0, startBal: 0, endBal: 0, meta: s.meta || { period: k, days: 30 } },
          acct_b: null
        };
      }
    });
    this._save(v2);
    return v2;
  },

  _seed() {
    const data = {
      schemaVer: 2,
      accountNames: { nfcu: 'Navy Federal', acct_b: 'Secondary Acct' },
      statements: {
        '2026-01': {
          nfcu: {
            income: 247.73, startBal: 161.85, endBal: 7.00,
            spending: { 'Dining':70.21,'Groceries':7.21,'Transport':2.40,'Medical':10.56,'Subscriptions':0,'Personal Care':31.82,'Entertainment':0,'P2P / Cash':97.78,'Other':0 },
            transfersOut: 182.60, transfersIn: 0, fees: 2.00,
            meta: { period: 'January 2026', days: 30 }
          },
          acct_b: null
        },
        '2026-02': {
          nfcu: {
            income: 1220.00, startBal: 7.00, endBal: 50.04,
            spending: { 'Dining':330.41,'Groceries':87.57,'Transport':15.57,'Medical':9.52,'Subscriptions':20.00,'Personal Care':43.33,'Entertainment':80.74,'P2P / Cash':89.82,'Other':0 },
            transfersOut: 500.00, transfersIn: 0, fees: 0,
            meta: { period: 'February 2026', days: 30 }
          },
          acct_b: null
        }
      }
    };
    this._save(data);
    return data;
  },

  /* ── Netting Engine ── */
  _netTransfers(stmtPeriod) {
    const accts    = Object.values(stmtPeriod).filter(Boolean);
    const totalOut = accts.reduce(function(s, a) { return s + (a.transfersOut || 0); }, 0);
    const totalIn  = accts.reduce(function(s, a) { return s + (a.transfersIn  || 0); }, 0);
    return { totalOut: totalOut, totalIn: totalIn, netted: Math.min(totalOut, totalIn) };
  },

  /* ── Unified period stats ── */
  _periodStats(stmtPeriod) {
    const accts   = Object.values(stmtPeriod).filter(Boolean);
    const netting = this._netTransfers(stmtPeriod);
    var totalIncome = 0, totalFees = 0;
    const unifiedCats = {};
    this.CATS.forEach(function(c) { unifiedCats[c] = 0; });
    accts.forEach(function(a) {
      totalIncome += (a.income || 0);
      totalFees   += (a.fees   || 0);
      Object.keys(a.spending).forEach(function(c) { if (unifiedCats[c] !== undefined) unifiedCats[c] += (a.spending[c] || 0); });
    });
    const totalSpend  = Object.values(unifiedCats).reduce(function(s, v) { return s + v; }, 0) + totalFees;
    const days        = accts[0] ? (accts[0].meta.days || 30) : 30;
    const net         = totalIncome - totalSpend - netting.netted;
    const burnRate    = totalSpend / days;
    const savingsRate = totalIncome > 0 ? ((totalIncome - totalSpend) / totalIncome) * 100 : 0;
    return { totalIncome: totalIncome, totalSpend: totalSpend, totalFees: totalFees, net: net, burnRate: burnRate, savingsRate: savingsRate, unifiedCats: unifiedCats, netting: netting, days: days };
  },

  /* ── Pace: spendPct vs dayPct (income-based) ── */
  _pace(stats, periodKey) {
    // Only apply live pacing to the current month
    const now    = new Date();
    const yr     = now.getFullYear();
    const mo     = String(now.getMonth() + 1).padStart(2, '0');
    const curKey = yr + '-' + mo;
    if (periodKey !== curKey) return null; // historical — no pacing
    const dayPct   = (now.getDate() / stats.days) * 100;
    const spendPct = stats.totalIncome > 0 ? (stats.totalSpend / stats.totalIncome) * 100 : 0;
    const delta    = spendPct - dayPct;
    var status;
    if (delta > 10)       status = 'overpace';
    else if (delta > 0)   status = 'watch';
    else                  status = 'ontrack';
    return { dayPct: dayPct, spendPct: spendPct, delta: delta, status: status };
  },

  /* ── Shift-to-Cost (net per 12hr base shift) ── */
  _netPerShift() {
    try {
      const cfg  = IncomeModule.CFG;
      const gross = cfg.baseRate * 12;
      return gross * (1 - cfg.tax);
    } catch { return 167.84; } // fallback: 17.31 * 12 * 0.808
  },

  /* ── 20% MoM Spike Detector ── */
  _spikeFlags(data, currentKey) {
    const keys = Object.keys(data.statements).sort();
    const idx  = keys.indexOf(currentKey);
    if (idx < 1) return [];
    const prevStats = this._periodStats(data.statements[keys[idx - 1]]);
    const currStats = this._periodStats(data.statements[currentKey]);
    const flags = [];
    var FM = this;
    this.CATS.forEach(function(cat) {
      const prev = prevStats.unifiedCats[cat];
      const curr = currStats.unifiedCats[cat];
      if (prev > 5 && curr > prev * 1.2) {
        const pct = (((curr - prev) / prev) * 100).toFixed(0);
        flags.push({ type: 'amber', icon: '📈', title: cat.toUpperCase() + ' SPIKE +' + pct + '%', detail: 'Was $' + prev.toFixed(2) + ' → now $' + curr.toFixed(2) + '. Extra spend: $' + (curr - prev).toFixed(2) + '.' });
      }
    });
    return flags;
  },

  /* ── Subscription Creep: 2+ consecutive months ── */
  _subFlags(data, currentKey) {
    const keys = Object.keys(data.statements).sort();
    const idx  = keys.indexOf(currentKey);
    if (idx < 1) return [];
    const curr     = data.statements[currentKey];
    const prev     = data.statements[keys[idx - 1]];
    const currSubs = Object.values(curr).filter(Boolean).reduce(function(s, a) { return s + (a.spending['Subscriptions'] || 0); }, 0);
    const prevSubs = Object.values(prev).filter(Boolean).reduce(function(s, a) { return s + (a.spending['Subscriptions'] || 0); }, 0);
    if (currSubs > 0 && prevSubs > 0)
      return [{ type: 'blue', icon: '🔁', title: 'RECURRING SUBSCRIPTIONS · $' + currSubs.toFixed(2) + '/mo', detail: 'Charged 2+ consecutive periods. Review each: still needed?\nDetected: Claude.AI $20/mo (Feb 2026).' }];
    return [];
  },

  /* ── Full flag suite — no dismiss ── */
  _allFlags(data, key, stats, pace) {
    const flags = [];

    // Savings rate
    if (stats.savingsRate < 0)
      flags.push({ type: 'red',   icon: '🔴', title: 'DEFICIT PERIOD',                                          detail: 'Spent $' + Math.abs(stats.net).toFixed(2) + ' more than earned. Immediate corrective action required.' });
    else if (stats.savingsRate < 10)
      flags.push({ type: 'red',   icon: '🔴', title: 'LOW SAVINGS RATE · ' + stats.savingsRate.toFixed(1) + '%', detail: 'Floor is 10%. You are below it.' });
    else if (stats.savingsRate < 20)
      flags.push({ type: 'amber', icon: '🟡', title: 'SAVINGS BELOW 20% TARGET · ' + stats.savingsRate.toFixed(1) + '%', detail: 'Push toward 20%+ for real resilience.' });
    else
      flags.push({ type: 'green', icon: '✅', title: 'SAVINGS RATE HEALTHY · ' + stats.savingsRate.toFixed(1) + '%', detail: 'Above the 20% target. Strong execution.' });

    // Pace flag (current month only)
    if (pace) {
      if (pace.status === 'overpace')
        flags.push({ type: 'red',   icon: '🚨', title: 'OVERPACING · ' + pace.spendPct.toFixed(1) + '% SPENT vs ' + pace.dayPct.toFixed(1) + '% OF MONTH', detail: 'You are ' + Math.abs(pace.delta).toFixed(1) + ' percentage points ahead of schedule. Slow down or you will end the month in deficit.' });
      else if (pace.status === 'watch')
        flags.push({ type: 'amber', icon: '⚠️', title: 'WATCH PACE · ' + pace.spendPct.toFixed(1) + '% SPENT vs ' + pace.dayPct.toFixed(1) + '% OF MONTH', detail: 'Slightly ahead of the income-based spend curve. Monitor closely.' });
      else
        flags.push({ type: 'green', icon: '🟢', title: 'PACE ON TRACK · ' + pace.spendPct.toFixed(1) + '% SPENT vs ' + pace.dayPct.toFixed(1) + '% OF MONTH', detail: 'Spending is in line with how far through the month you are.' });
    }

    // Dining — with shift-to-cost
    const dining       = stats.unifiedCats['Dining'] || 0;
    const netPerShift  = this._netPerShift();
    if (dining > 0) {
      const shiftsUsed = (dining / netPerShift).toFixed(1);
      const diningPct  = stats.totalSpend > 0 ? (dining / stats.totalSpend) * 100 : 0;
      const flagType   = diningPct > 25 ? 'amber' : 'blue';
      const flagTitle  = diningPct > 25
        ? 'DINING OVER 25% OF SPEND · ' + diningPct.toFixed(1) + '%'
        : 'DINING TRACKER · ' + diningPct.toFixed(1) + '% OF SPEND';
      flags.push({ type: flagType, icon: '🍽️', title: flagTitle, detail: '$' + dining.toFixed(2) + ' on dining this period. Cut by 50% = +$' + (dining * 0.5).toFixed(0) + '/mo recovered.', shiftCost: '🏥 Cost: ' + shiftsUsed + ' Corewell 12hr shifts (' + netPerShift.toFixed(2) + ' net/shift)' });
    }

    // Fees
    if (stats.totalFees > 0)
      flags.push({ type: 'red', icon: '💸', title: 'BANK FEES · $' + stats.totalFees.toFixed(2), detail: 'ATM charges, overdraft, or denied transaction fees. 100% avoidable.' });

    // Netting info
    if (stats.netting.netted > 0)
      flags.push({ type: 'blue', icon: '🔀', title: 'TRANSFER NETTING · $' + stats.netting.netted.toFixed(2) + ' ZEROED', detail: 'Cross-account flows removed from totals. Figures reflect true discretionary spend only.' });

    // Burn rate info
    flags.push({ type: 'blue', icon: '📊', title: 'DAILY BURN RATE · $' + stats.burnRate.toFixed(2) + '/day', detail: 'Your daily operational cost this period. × 30 = $' + (stats.burnRate * 30).toFixed(0) + ' projected monthly.' });

    return [...flags, ...this._spikeFlags(data, key), ...this._subFlags(data, key)];
  },

  _activePeriod: null,
  _panelOpen: false,
  _addAcct: 'nfcu',
  _cogOpen: false,
  _advancedOpen: false,

  init() {
    const data  = this._load();
    const keys  = Object.keys(data.statements).sort();
    if (!this._activePeriod || !data.statements[this._activePeriod])
      this._activePeriod = keys[keys.length - 1];

    const stmt   = data.statements[this._activePeriod];
    const stats  = this._periodStats(stmt);
    const pace   = this._pace(stats, this._activePeriod);
    const flags  = this._allFlags(data, this._activePeriod, stats, pace);
    const netColor = stats.net >= 0 ? 'var(--green)' : 'var(--red)';
    const srColor  = stats.savingsRate >= 20 ? 'var(--green)' : stats.savingsRate >= 10 ? 'var(--amber)' : 'var(--red)';

    // Burn rate color from pace
    var burnColor = 'var(--amber)';
    if (pace) {
      if (pace.status === 'overpace') burnColor = 'var(--red)';
      else if (pace.status === 'ontrack') burnColor = 'var(--green)';
    }
    const paceLabel = pace
      ? (pace.status === 'overpace' ? ' ⚠ OVERPACE' : pace.status === 'watch' ? ' ▲ WATCH' : ' ✓ ON TRACK')
      : '';

    // Period pills
    const FM = this;
    const periodPills = keys.map(function(k) {
      const ref   = data.statements[k].nfcu || data.statements[k].acct_b;
      const label = ref ? ref.meta.period.replace(' 2026', '') : k;
      return '<div class="pill' + (k === FM._activePeriod ? ' active' : '') + '" onclick="FinanceModule._setPeriod(\'' + k + '\')">' + label + '</div>';
    }).join('');

    // Compact account header lines (change 4 + 5)
    const acctLines = Object.entries(this.ACCOUNTS).map(function([id, def]) {
      const a         = stmt[id];
      const acctName  = (data.accountNames && data.accountNames[id]) || def.name;
      if (!a) return '<div class="fin-acct-line"><span class="fin-acct-line-name" style="color:' + def.color + '40">' + acctName + '</span><span class="fin-acct-line-detail">no data this period</span></div>';
      const acctSpend = Object.values(a.spending).reduce(function(s, v) { return s + v; }, 0) + (a.fees || 0);
      return '<div class="fin-acct-line"><span class="fin-acct-line-name" style="color:' + def.color + '">' + acctName + '</span><span class="fin-acct-line-detail">$' + (a.startBal || 0).toFixed(0) + ' → $' + (a.endBal || 0).toFixed(0) + ' &nbsp;·&nbsp; +$' + a.income.toFixed(0) + ' in &nbsp;·&nbsp; −$' + acctSpend.toFixed(0) + ' out</span></div>';
    }).join('');
    const nettedLine = stats.netting.netted > 0
      ? '<div class="fin-acct-netted">⇌ $' + stats.netting.netted.toFixed(2) + ' transfers netted</div>'
      : '';

    // Pace bar (change 7)
    var paceBarHTML = '';
    if (pace) {
      const spendW  = Math.min(pace.spendPct, 100).toFixed(1);
      const dayW    = Math.min(pace.dayPct, 100).toFixed(1);
      const barColor = pace.status === 'overpace' ? 'var(--red)' : pace.status === 'watch' ? 'var(--amber)' : 'var(--green)';
      paceBarHTML = '<div class="fin-pace-label"><span style="color:' + barColor + '">SPEND ' + pace.spendPct.toFixed(1) + '%</span><span style="color:var(--muted)">DAY ' + pace.dayPct.toFixed(1) + '% OF MONTH</span></div><div class="fin-pace-bar"><div class="fin-pace-spend" style="width:' + spendW + '%;background:' + barColor + '"></div><div class="fin-pace-day-marker" style="left:' + dayW + '%"></div></div>';
    }

    // Category bars (change 4 — no separate Phase 1 section)
    const maxSpend = Math.max.apply(null, Object.values(stats.unifiedCats).concat([1]));
    const catRows = this.CATS.map(function(cat) {
      const total = stats.unifiedCats[cat] || 0;
      if (total === 0) return '';
      const color     = FM.CAT_COLORS[cat];
      const pctOfMax  = (total / maxSpend) * 100;
      const acctBars  = Object.entries(FM.ACCOUNTS).map(function([id, def]) {
        const a = stmt[id];
        if (!a) return '';
        const av = a.spending[cat] || 0;
        if (av === 0) return '';
        const avPct = (av / maxSpend) * 100;
        return '<div class="fin-cat-bar-track" title="' + ((data.accountNames && data.accountNames[id]) || def.name) + ': $' + av.toFixed(2) + '"><div class="fin-cat-bar-fill" style="width:' + avPct.toFixed(1) + '%;background:' + def.color + ';opacity:0.55"></div></div>';
      }).filter(Boolean).join('');
      return '<div class="fin-cat-row"><div class="fin-cat-top"><div class="fin-cat-name">' + cat + '</div><div class="fin-cat-dual-bar"><div class="fin-cat-bar-track"><div class="fin-cat-bar-fill" style="width:' + pctOfMax.toFixed(1) + '%;background:' + color + '"></div></div>' + acctBars + '</div><div class="fin-cat-amt" style="color:' + color + '">$' + total.toFixed(0) + '</div></div></div>';
    }).filter(Boolean).join('');

    // Flags — no dismiss button (change 1)
    const flagsHTML = flags.length
      ? flags.map(function(f) {
          const shiftLine = f.shiftCost ? '<div class="fin-shift-cost">' + f.shiftCost + '</div>' : '';
          return '<div class="fin-flag flag-' + f.type + '"><span class="fin-flag-icon">' + f.icon + '</span><div class="fin-flag-body"><div class="fin-flag-title">' + f.title + '</div><div class="fin-flag-detail">' + f.detail + shiftLine + '</div></div></div>';
        }).join('')
      : '<div class="empty-state">ALL CLEAR</div>';

    // 3-month compare
    const recent3 = keys.slice(-3);
    const maxNet  = Math.max.apply(null, recent3.map(function(k) { return Math.abs(FM._periodStats(data.statements[k]).net); }).concat([1]));
    const compareBars = recent3.map(function(k) {
      const s   = FM._periodStats(data.statements[k]);
      const ht  = (Math.abs(s.net) / maxNet) * 100;
      const col = s.net >= 0 ? 'var(--green)' : 'var(--red)';
      const ref = data.statements[k].nfcu || data.statements[k].acct_b;
      const lbl = ref ? ref.meta.period.replace(' 2026', '').substring(0, 3).toUpperCase() : k;
      return '<div class="fin-cbar-wrap"><div class="fin-cbar-amt" style="color:' + col + '">' + (s.net >= 0 ? '+' : '') + '$' + Math.abs(s.net).toFixed(0) + '</div><div class="fin-cbar" style="height:' + ht + '%;background:' + col + ';opacity:0.75"></div><div class="fin-cbar-label">' + lbl + '</div></div>';
    }).join('');

    // Quick Add panel (change 3) — 3 fields + Advanced toggle
    const catInputs = this.CATS.map(function(c) {
      return '<div class="fin-cat-input-row"><div class="fin-cat-input-label">' + c + '</div><input type="number" id="fin-cat-' + c.replace(/[\s\/]/g, '_') + '" placeholder="0.00" /></div>';
    }).join('');

    mount(
      '<header class="mod-header">' +
        '<div><span class="sys-label">TruOS · Module 05</span><h1 class="mod-title">Finance<br><em>Audit</em></h1></div>' +
        '<div style="display:flex;align-items:flex-start;gap:10px">' +
          '<div style="text-align:right">' +
            '<div class="sys-label" style="margin-bottom:4px">Burn Rate</div>' +
            '<div style="font-family:var(--mono);font-size:18px;font-weight:700;color:' + burnColor + '">$' + stats.burnRate.toFixed(2) + '<span style="font-size:9px;color:' + burnColor + '">' + paceLabel + '</span></div>' +
          '</div>' +
          '<button class="fin-cog-btn" onclick="FinanceModule._openCog()">⚙</button>' +
        '</div>' +
      '</header>' +
      '<div class="fin-wrap">' +
        '<div class="fin-period-row">' + periodPills + '<div class="pill" onclick="FinanceModule._openPanel(\'nfcu\')">+ Add</div></div>' +
        // Compact account header (merged Phase 1+2)
        '<div class="fin-acct-header-bar">' + acctLines + nettedLine + '</div>' +
        paceBarHTML +
        // Category bars
        '<div class="fin-phase-head">Spend Breakdown · <span>' + (data.statements[this._activePeriod].nfcu || data.statements[this._activePeriod].acct_b).meta.period + '</span></div>' +
        '<div class="fin-cats">' + catRows + '</div>' +
        // Phase 3 flags
        '<div class="fin-phase-head">Phase 3 · <span>Audit Flags</span></div>' +
        '<div class="fin-flags">' + flagsHTML + '</div>' +
        // 3-month trend
        '<div class="fin-phase-head">3-Month Net Trend</div>' +
        '<div class="fin-compare-bars">' + compareBars + '</div>' +
      '</div>' +
      // Phase 4 sticky
      '<div class="fin-p4-sticky">' +
        '<div class="fin-p4-metric"><span class="fin-p4-val" style="color:' + srColor + '">' + stats.savingsRate.toFixed(1) + '%</span><span class="fin-p4-sub">Savings Rate</span></div>' +
        '<div class="fin-p4-metric"><span class="fin-p4-val" style="color:' + burnColor + '">$' + stats.burnRate.toFixed(2) + '</span><span class="fin-p4-sub">Burn / Day</span></div>' +
        '<div class="fin-p4-metric"><span class="fin-p4-val" style="color:' + netColor + ';font-size:13px">' + (stats.net >= 0 ? '+' : '') + '$' + Math.abs(stats.net).toFixed(0) + '</span><span class="fin-p4-sub">Net Period</span></div>' +
      '</div>' +
      // Quick Add panel (change 3)
      '<div class="slide-panel" id="fin-panel">' +
        '<div class="fin-panel-title">+ Quick <span>Statement</span></div>' +
        '<div class="fin-section-head">Account</div>' +
        '<div class="fin-acct-select">' +
          '<div class="fin-acct-opt' + (this._addAcct === 'nfcu' ? ' selected' : '') + '" onclick="FinanceModule._setAddAcct(\'nfcu\')">Navy Federal</div>' +
          '<div class="fin-acct-opt' + (this._addAcct === 'acct_b' ? ' selected' : '') + '" onclick="FinanceModule._setAddAcct(\'acct_b\')">Secondary</div>' +
        '</div>' +
        '<input id="fin-period-label" placeholder="e.g. March 2026" />' +
        '<input id="fin-income" type="number" placeholder="Total Income ($)" />' +
        '<input id="fin-total-spend" type="number" placeholder="Total Spend ($)" />' +
        '<input id="fin-dining-quick" type="number" placeholder="Dining ($)" />' +
        '<button class="fin-advanced-toggle" onclick="FinanceModule._toggleAdvanced()">▸ Advanced breakdown</button>' +
        '<div class="fin-advanced-section' + (this._advancedOpen ? ' open' : '') + '" id="fin-advanced">' +
          '<div style="display:flex;gap:8px"><input id="fin-fees" type="number" placeholder="Fees ($)" style="flex:1" /><input id="fin-start-bal" type="number" placeholder="Start Bal ($)" style="flex:1" /></div>' +
          '<div style="display:flex;gap:8px"><input id="fin-end-bal" type="number" placeholder="End Bal ($)" style="flex:1" /><input id="fin-xfer-out" type="number" placeholder="Transfers Out ($)" style="flex:1" /></div>' +
          '<input id="fin-xfer-in" type="number" placeholder="Transfers In ($)" />' +
          '<div class="fin-section-head">Per Category</div>' +
          '<div class="fin-cat-inputs">' + catInputs + '</div>' +
        '</div>' +
        '<button class="fin-save-btn" onclick="FinanceModule._saveStatement()">SAVE STATEMENT</button>' +
      '</div>'
    );
  },

  _setPeriod(key) { this._activePeriod = key; this.init(); },
  _setAddAcct(id) { this._addAcct = id; this.init(); setTimeout(function() { FinanceModule._openPanel(id); }, 50); },
  _toggleAdvanced() {
    this._advancedOpen = !this._advancedOpen;
    const el = document.getElementById('fin-advanced');
    const btn = document.querySelector('.fin-advanced-toggle');
    if (el) el.classList.toggle('open', this._advancedOpen);
    if (btn) btn.textContent = (this._advancedOpen ? '▾ ' : '▸ ') + 'Advanced breakdown';
  },

  _openPanel(acctId) {
    if (acctId) this._addAcct = acctId;
    this._panelOpen = true;
    const el = document.getElementById('fin-panel');
    if (el) el.classList.add('open');
  },
  _closePanel() {
    this._panelOpen = false;
    const el = document.getElementById('fin-panel');
    if (el) el.classList.remove('open');
  },

  // Change 6 — Settings cog modal for rename
  _openCog() {
    this._cogOpen = true;
    const data = this._load();
    const nfcuName   = (data.accountNames && data.accountNames['nfcu'])   || 'Navy Federal';
    const acctbName  = (data.accountNames && data.accountNames['acct_b']) || 'Secondary Acct';
    const modal = document.createElement('div');
    modal.className = 'fin-cog-modal';
    modal.id = 'fin-cog-modal';
    modal.innerHTML =
      '<div class="fin-cog-inner">' +
        '<div class="fin-cog-title">⚙ ACCOUNT SETTINGS</div>' +
        '<div class="fin-cog-row"><div class="fin-cog-label">Navy Federal Label</div><input id="fin-cog-nfcu" value="' + nfcuName + '" /></div>' +
        '<div class="fin-cog-row"><div class="fin-cog-label">Secondary Account Label</div><input id="fin-cog-acctb" value="' + acctbName + '" /></div>' +
        '<button class="fin-cog-save" onclick="FinanceModule._saveCog()">SAVE CHANGES</button>' +
        '<button class="fin-cog-close" onclick="FinanceModule._closeCog()">Cancel</button>' +
      '</div>';
    document.body.appendChild(modal);
  },
  _saveCog() {
    const data  = this._load();
    const nfcu  = document.getElementById('fin-cog-nfcu');
    const acctb = document.getElementById('fin-cog-acctb');
    if (!data.accountNames) data.accountNames = {};
    if (nfcu  && nfcu.value.trim())  data.accountNames['nfcu']   = nfcu.value.trim();
    if (acctb && acctb.value.trim()) data.accountNames['acct_b'] = acctb.value.trim();
    this._save(data);
    this._closeCog();
    Shell.toast('Settings saved');
    this.init();
  },
  _closeCog() {
    const el = document.getElementById('fin-cog-modal');
    if (el) el.parentNode.removeChild(el);
    this._cogOpen = false;
  },

  _saveStatement() {
    const label = document.getElementById('fin-period-label') ? document.getElementById('fin-period-label').value.trim() : '';
    if (!label) { Shell.toast('Enter a period label', true); return; }

    const income      = parseFloat((document.getElementById('fin-income')       || {}).value) || 0;
    const totalSpend  = parseFloat((document.getElementById('fin-total-spend')  || {}).value) || 0;
    const diningQuick = parseFloat((document.getElementById('fin-dining-quick') || {}).value) || 0;
    const fees        = parseFloat((document.getElementById('fin-fees')         || {}).value) || 0;
    const startBal    = parseFloat((document.getElementById('fin-start-bal')    || {}).value) || 0;
    const endBal      = parseFloat((document.getElementById('fin-end-bal')      || {}).value) || 0;
    const xferOut     = parseFloat((document.getElementById('fin-xfer-out')     || {}).value) || 0;
    const xferIn      = parseFloat((document.getElementById('fin-xfer-in')      || {}).value) || 0;

    const months = ['january','february','march','april','may','june','july','august','september','october','november','december'];
    const parts  = label.toLowerCase().split(' ');
    const mIdx   = months.indexOf(parts[0]);
    const yr     = parts[1] || '2026';
    const key    = mIdx >= 0 ? (yr + '-' + String(mIdx + 1).padStart(2, '0')) : label.replace(/\s+/g, '-').toLowerCase();

    // If advanced open, read per-cat; else distribute totalSpend with dining carved out
    var spending = {};
    if (this._advancedOpen) {
      this.CATS.forEach(function(c) {
        const el = document.getElementById('fin-cat-' + c.replace(/[\s\/]/g, '_'));
        spending[c] = parseFloat((el || {}).value) || 0;
      });
    } else {
      this.CATS.forEach(function(c) { spending[c] = 0; });
      spending['Dining'] = diningQuick;
      spending['Other']  = Math.max(0, totalSpend - diningQuick - fees);
    }

    const data = this._load();
    if (!data.statements[key]) data.statements[key] = { nfcu: null, acct_b: null };
    data.statements[key][this._addAcct] = { income: income, spending: spending, startBal: startBal, endBal: endBal, transfersOut: xferOut, transfersIn: xferIn, fees: fees, meta: { period: label, days: 30 } };
    this._save(data);
    this._activePeriod = key;
    this._advancedOpen = false;
    this._closePanel();
    Shell.toast('Statement saved');
    this.init();
  },

  stats() {
    const data = this._load();
    const keys = Object.keys(data.statements).sort();
    if (!keys.length) return null;
    const latest = data.statements[keys[keys.length - 1]];
    const stats  = this._periodStats(latest);
    const ref    = latest.nfcu || latest.acct_b;
    return Object.assign({}, stats, { period: ref ? ref.meta.period : keys[keys.length - 1] });
  },

  teardown() { this._panelOpen = false; if (this._cogOpen) this._closeCog(); }
};



/* ═══════════════════════════════════════════
   Reads all three storage keys fresh on every
   mount. No shared state — localStorage IS
   the bus.
═══════════════════════════════════════════ */
const DashboardModule = {

  // Reuse Income math directly — single source of truth
  _incomeStats() {
    const CFG = IncomeModule.CFG;
    try {
      const raw = localStorage.getItem('truos_schedule_v34');
      const weeks = raw ? JSON.parse(raw) : IncomeModule.emptyWeeks();
      if (!Array.isArray(weeks) || weeks.length !== 2) return { net: 0, hrs: 0, pct: 0, gap: CFG.target };
      const calcs  = weeks.map(w => IncomeModule.calcWeek(w));
      const gross  = calcs[0].totalGross + calcs[1].totalGross;
      const net    = IncomeModule.toNet(gross);
      const hrs    = calcs[0].totalHrs   + calcs[1].totalHrs;
      const pct    = Math.min(100, (net / CFG.target) * 100);
      const gap    = Math.max(0, CFG.target - net);
      return { net, hrs, pct, gap, target: CFG.target };
    } catch { return { net: 0, hrs: 0, pct: 0, gap: CFG.target, target: CFG.target }; }
  },

  _academicStats() {
    try {
      const raw  = localStorage.getItem('truos-academic');
      const data = raw ? JSON.parse(raw) : [];
      const now  = new Date();
      const in72 = new Date(now.getTime() + 72 * 36e5);
      const overdue  = data.filter(a => !a.done && new Date(a.due) < now);
      const urgent   = data.filter(a => !a.done && new Date(a.due) >= now && new Date(a.due) <= in72);
      const done     = data.filter(a => a.done).length;
      const total    = data.length;
      const upcoming = data
        .filter(a => !a.done && new Date(a.due) >= now)
        .sort((a, b) => new Date(a.due) - new Date(b.due));
      const next = upcoming[0] || null;
      return { overdue: overdue.length, urgent: urgent.length, done, total, next };
    } catch { return { overdue: 0, urgent: 0, done: 0, total: 0, next: null }; }
  },

  _tradingLocked(overdueCount) {
    return overdueCount > 0;
  },

  // Status line — reads the full system state and picks a message
  _statusLine(income, academic, tradingLocked) {
    const incomeGood   = income.pct  >= 100;
    const academicGood = academic.overdue === 0;

    if (incomeGood && academicGood)
      return { text: 'ALL SYSTEMS NOMINAL', color: 'var(--green)' };
    if (!academicGood && income.gap > 500)
      return { text: `DEBT ON TWO FRONTS · ${academic.overdue} OVERDUE · $${Math.round(income.gap)} GAP`, color: 'var(--red)' };
    if (!academicGood)
      return { text: `ACADEMIC DEBT DETECTED · ${academic.overdue} OVERDUE TASK${academic.overdue !== 1 ? 'S' : ''}`, color: 'var(--red)' };
    if (academic.total - academic.done > 5)
      return { text: 'WARNING: HIGH ACADEMIC LOAD', color: 'var(--amber)' };
    if (income.gap > 0)
      return { text: `$${Math.round(income.gap)} TO TARGET · SCHEDULE MORE SHIFTS`, color: 'var(--amber)' };
    return { text: 'INCOME SECURED · CLEAR BACKLOG TO UNLOCK TRADING', color: 'var(--blue)' };
  },

  init() {
    const income   = this._incomeStats();
    const academic = this._academicStats();
    const locked   = this._tradingLocked(academic.overdue);
    const status   = this._statusLine(income, academic, locked);

    const fmt = (n) => n.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });

    // Income bar color
    const barColor = income.pct >= 100 ? 'var(--green)'
      : income.pct >= 60 ? 'var(--amber)' : 'var(--red)';

    // Academic badge — shows overdue first, then 72h warning, then clear
    const acBadge = academic.overdue > 0
      ? `<span class="dash-card-badge badge-warn">${academic.overdue} OVERDUE</span>`
      : academic.urgent > 0
        ? `<span class="dash-card-badge badge-warn" style="background:rgba(245,166,35,0.15);border-color:rgba(245,166,35,0.4);color:var(--amber)">${academic.urgent} DUE SOON</span>`
        : `<span class="dash-card-badge badge-ok">CLEAR</span>`;

    // Next due string
    const nextDueHTML = academic.next
      ? `<div class="dash-next-due">NEXT DUE → <strong>${esc(academic.next.title)}</strong> · ${new Date(academic.next.due).toLocaleDateString([],{month:'short',day:'numeric'})}</div>`
      : academic.total === 0
        ? `<div class="dash-next-due">NO TASKS LOGGED</div>`
        : `<div class="dash-next-due" style="color:var(--green)">NO UPCOMING TASKS</div>`;

    // Trading badge
    const tradeBadge = locked
      ? `<span class="dash-card-badge badge-locked">LOCKED</span>`
      : `<span class="dash-card-badge badge-clear">UNLOCKED</span>`;
    const tradeColor = locked ? 'var(--amber)' : 'var(--green)';
    const tradeText  = locked
      ? `Clear ${academic.overdue} overdue task${academic.overdue !== 1 ? 's' : ''} to unlock`
      : 'Academic backlog clear — terminal active';

    const c = nowClock();

    mount(`
      <header class="mod-header">
        <div>
          <span class="sys-label">TruOS · Dashboard</span>
          <h1 class="mod-title">System<br><em>Overview</em></h1>
        </div>
        <div style="text-align:right">
          <div class="sys-label" id="dash-date">${c.date}</div>
          <div style="font-family:var(--mono);font-size:18px;font-weight:700;" id="dash-time">${c.time}</div>
        </div>
      </header>

      <div class="dash-wrap">

        <!-- Status line -->
        <div class="dash-status">
          <div class="sys-label" style="text-align:center;margin-bottom:6px">System Status</div>
          <div class="dash-status-line" style="color:${status.color}">${status.text}</div>
        </div>

        <!-- Income card -->
        <div class="dash-card" onclick="Shell.switchTo('income')">
          <div class="dash-card-top">
            <span class="dash-card-label">Income · Biweekly</span>
            ${income.pct >= 100
              ? `<span class="dash-card-badge badge-ok">GOAL MET</span>`
              : `<span class="dash-card-badge badge-warn">$${fmt(income.gap)} GAP</span>`}
          </div>
          <div class="dash-val" style="color:${barColor}">$${fmt(income.net)}</div>
          <div class="dash-sub">of $${fmt(income.target)} target · ${income.hrs}H scheduled</div>
          <div class="dash-bar">
            <div class="dash-bar-fill" style="width:${income.pct}%;background:${barColor}"></div>
          </div>
          <div class="dash-sub">${income.pct.toFixed(1)}% complete</div>
          <div class="dash-tap-hint">TAP TO EDIT SCHEDULE →</div>
        </div>

        <!-- Academic card -->
        <div class="dash-card" onclick="Shell.switchTo('academic')">
          <div class="dash-card-top">
            <span class="dash-card-label">Academic · Tasks</span>
            ${acBadge}
          </div>
          <div style="display:flex;gap:16px;align-items:flex-end">
            <div>
              <div class="dash-val" style="color:${academic.overdue > 0 ? 'var(--red)' : 'var(--green)'}">
                ${academic.overdue}
              </div>
              <div class="dash-sub">overdue</div>
            </div>
            <div style="padding-bottom:2px">
              <div style="font-family:var(--mono);font-size:18px;font-weight:700;color:var(--muted)">${academic.done}/${academic.total}</div>
              <div class="dash-sub">completed</div>
            </div>
          </div>
          ${nextDueHTML}
          <div class="dash-tap-hint">TAP TO VIEW TASKS →</div>
        </div>

        <!-- Trading card -->
        <div class="dash-card" onclick="Shell.switchTo('trading')">
          <div class="dash-card-top">
            <span class="dash-card-label">Trading · Terminal</span>
            ${tradeBadge}
          </div>
          <div class="dash-val" style="color:${tradeColor};font-size:20px;margin-bottom:6px">
            ${locked ? '⚠ RESTRICTED' : '● OPERATIONAL'}
          </div>
          <div class="dash-sub">${tradeText}</div>
          <div class="dash-tap-hint">TAP TO OPEN TERMINAL →</div>
        </div>

        <!-- Finance card -->
        ${(() => {
          const fin = FinanceModule.stats();
          if (!fin) return `
            <div class="dash-card" onclick="Shell.switchTo('finance')">
              <div class="dash-card-top">
                <span class="dash-card-label">Finance · Audit</span>
                <span class="dash-card-badge badge-warn">NO DATA</span>
              </div>
              <div class="dash-sub">No statements logged yet.</div>
              <div class="dash-tap-hint">TAP TO ADD STATEMENT →</div>
            </div>`;
          const netColor  = fin.net >= 0 ? 'var(--green)' : 'var(--red)';
          const srColor   = fin.savingsRate >= 20 ? 'var(--green)' : fin.savingsRate >= 10 ? 'var(--amber)' : 'var(--red)';
          const finBadge  = fin.savingsRate < 10
            ? `<span class="dash-card-badge badge-warn">${fin.savingsRate.toFixed(1)}% SAVINGS</span>`
            : `<span class="dash-card-badge badge-ok">${fin.savingsRate.toFixed(1)}% SAVINGS</span>`;
          return `
            <div class="dash-card" onclick="Shell.switchTo('finance')">
              <div class="dash-card-top">
                <span class="dash-card-label">Finance · ${esc(fin.period)}</span>
                ${finBadge}
              </div>
              <div style="display:flex;gap:16px;align-items:flex-end">
                <div>
                  <div class="dash-val" style="color:${netColor}">${fin.net >= 0 ? '+' : ''}$${Math.abs(fin.net).toFixed(0)}</div>
                  <div class="dash-sub">net this period</div>
                </div>
                <div style="padding-bottom:2px">
                  <div style="font-family:var(--mono);font-size:18px;font-weight:700;color:var(--amber)">$${fin.burnRate.toFixed(2)}</div>
                  <div class="dash-sub">daily burn</div>
                </div>
              </div>
              <div class="dash-tap-hint">TAP TO VIEW AUDIT →</div>
            </div>`;
        })()}

      </div>
    `);
  },

  updateClock() {
    const c = nowClock();
    const te = document.getElementById('dash-time');
    const de = document.getElementById('dash-date');
    if (te) te.textContent = c.time;
    if (de) de.textContent = c.date;
  },

  teardown() {}
};

/* ═══════════════════════════════════════════
   BOOT
═══════════════════════════════════════════ */
Shell.modules = { dashboard: DashboardModule, income: IncomeModule, academic: AcademicModule, trading: TradingModule, finance: FinanceModule };
Shell.init();
</script>
